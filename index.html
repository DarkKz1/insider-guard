/* =====================================================================
   ЗАГРУЗКА СВОЕГО ЛОГА (CSV) — отдельный, полностью клиентский путь.
   Закрывает возражение жюри «работает только на синтетике?»: судья даёт
   свой access-лог → парсим → считаем baseline ИЗ ЭТИХ данных (leave-one-
   day-out) → собираем кейс в ТОЙ ЖЕ форме, что встроенные CASES → гоним
   СУЩЕСТВУЮЩИЙ analyze(). Никакой новой scoring-логики, только маппинг +
   переиспользование. CASES / analyze() / shap НЕ затронуты.
   ===================================================================== */

// Встроенный реалистичный сэмпл: инсайдер-эксфильтрация (норма ~50 строк/день,
// затем ночная выгрузка десятков тысяч) + два benign-пользователя (дневной
// аналитик в норме и ночной ETL-сервис со стабильно крупным объёмом).
const CSV_SAMPLE = `user,role,resource,action,rows,ts,host,ip
sabit.a,analyst,DB-PERSONS,SELECT,48,2026-06-08 10:12,WS-12,10.20.4.12
sabit.a,analyst,DB-PERSONS,SELECT,52,2026-06-09 11:40,WS-12,10.20.4.12
sabit.a,analyst,DB-PERSONS,SELECT,45,2026-06-10 09:55,WS-12,10.20.4.12
sabit.a,analyst,DB-PERSONS,SELECT,57,2026-06-11 14:20,WS-12,10.20.4.12
sabit.a,analyst,DB-PERSONS,SELECT,41000,2026-06-12 02:14,WS-12,10.20.4.12
sabit.a,analyst,DB-PERSONS,EXPORT,40000,2026-06-12 02:31,WS-12,10.20.4.12
dana.k,analyst,DB-TAX,SELECT,310,2026-06-08 10:05,WS-21,10.20.5.21
dana.k,analyst,DB-TAX,SELECT,295,2026-06-09 11:10,WS-21,10.20.5.21
dana.k,analyst,DB-TAX,SELECT,330,2026-06-10 15:42,WS-21,10.20.5.21
dana.k,analyst,DB-TAX,SELECT,288,2026-06-11 13:30,WS-21,10.20.5.21
svc_etl,service,DB-PERSONS,SELECT,84000,2026-06-08 03:00,BACKUP-1,10.40.0.1
svc_etl,service,DB-PERSONS,SELECT,86000,2026-06-09 03:00,BACKUP-1,10.40.0.1
svc_etl,service,DB-PERSONS,SELECT,85000,2026-06-10 03:00,BACKUP-1,10.40.0.1
svc_etl,service,DB-PERSONS,SELECT,90000,2026-06-11 03:00,BACKUP-1,10.40.0.1`;

// Алиасы заголовков (рус/англ, толерантно к регистру/пробелам).
const CSV_ALIASES = {
  user:     ['user','пользователь','username','account','аккаунт','subject','login'],
  role:     ['role','роль'],
  resource: ['resource','ресурс','table','таблица','object','db_object','target'],
  action:   ['action','действие','operation','операция','event','cmd'],
  rows:     ['rows','строк','строки','count','records','записей','volume','объем','объём'],
  ts:       ['ts','time','время','timestamp','datetime','date','дата'],
  host:     ['host','хост','station','арм','machine','workstation','source_host'],
  ip:       ['ip','адрес','src_ip','ip_address'],
};

// Разбор одной CSV-строки с учётом кавычек и запятых внутри полей.
function splitCsvLine(line) {
  const out = []; let cur = '', q = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (q) {
      if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (ch === '"') q = false;
      else cur += ch;
    } else {
      if (ch === '"') q = true;
      else if (ch === ',' || ch === ';' || ch === '\t') { out.push(cur); cur = ''; }
      else cur += ch;
    }
  }
  out.push(cur);
  return out.map(s => s.trim());
}

// Нормализация ts к формату "YYYY-MM-DD HH:MM" (его ждут hourOf/dowOf — slice по позициям).
function normalizeTs(raw) {
  let s = (raw || '').trim().replace('T', ' ').replace(/\//g, '-');
  // "2026-06-12 02:14:33" → срезаем секунды; "2026-06-12 2:14" → доводим час до 2 знаков
  const m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})[ ]+(\d{1,2}):(\d{2})/);
  if (m) {
    const [, y, mo, d, h, mi] = m;
    return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')} ${h.padStart(2,'0')}:${mi}`;
  }
  // только дата → добавим полдень (нейтральный час)
  const md = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (md) { const [, y, mo, d] = md; return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')} 12:00`; }
  return s.slice(0, 16); // best-effort
}

// Парсинг CSV → массив нормализованных событий. Бросает понятную ошибку при невалидном входе.
function parseAccessCsv(text) {
  const raw = (text || '').replace(/\r/g, '');
  const lines = raw.split('\n').map(l => l).filter(l => l.trim().length);
  if (lines.length < 2) {
    throw new Error('CSV должен содержать строку-заголовок и хотя бы одну строку данных.');
  }
  const header = splitCsvLine(lines[0]).map(h => h.toLowerCase().replace(/^"|"$/g, '').trim());
  // сопоставляем колонки по алиасам
  const colIdx = {};
  Object.entries(CSV_ALIASES).forEach(([key, aliases]) => {
    const i = header.findIndex(h => aliases.includes(h));
    if (i >= 0) colIdx[key] = i;
  });
  if (colIdx.user === undefined) {
    throw new Error('Не найдена колонка пользователя (user / пользователь). Заголовок: ' + header.join(', '));
  }
  if (colIdx.resource === undefined && colIdx.action === undefined && colIdx.rows === undefined) {
    throw new Error('Нужна хотя бы одна из колонок: resource / action / rows.');
  }
  const events = [];
  for (let li = 1; li < lines.length; li++) {
    const cells = splitCsvLine(lines[li]);
    const get = (k) => (colIdx[k] !== undefined ? (cells[colIdx[k]] || '').trim() : '');
    const user = get('user');
    if (!user) continue; // пропускаем пустые строки
    const action = (get('action') || 'SELECT').toUpperCase().replace(/[^A-Z_]/g, '') || 'SELECT';
    const rowsRaw = get('rows').replace(/[^\d.-]/g, '');
    const rows = rowsRaw ? Math.max(0, Math.round(parseFloat(rowsRaw)) || 0) : 0;
    events.push({
      user,
      role: get('role') || 'user',
      resource: get('resource') || 'DB-UNKNOWN',
      action,
      rows,
      ts: normalizeTs(get('ts')),
      host: get('host') || ('HOST-' + user),
      ip: get('ip') || '0.0.0.0',
    });
  }
  if (!events.length) throw new Error('Не удалось разобрать ни одной строки данных.');
  return events;
}

// baseline ИЗ истории пользователя методом leave-one-day-out:
// группируем чтение по дню → суммарный объём/день → среднее БЕЗ аномального
// (максимального) дня, чтобы выбросовый день не раздувал свою же норму.
function computeBaselineFromEvents(userEvents) {
  const byDay = {};
  userEvents.forEach(e => {
    if (!['SELECT','EXPORT','DOWNLOAD'].includes(e.action)) return;
    const day = (e.ts || '').slice(0, 10) || 'unknown';
    byDay[day] = (byDay[day] || 0) + (e.rows || 0);
  });
  let daily = Object.values(byDay);
  if (!daily.length) daily = [0];
  let baseDaily = daily;
  if (daily.length >= 2) {
    const sorted = [...daily].sort((a,b)=> a-b);
    baseDaily = sorted.slice(0, sorted.length - 1); // leave-one-day-out: исключаем аномальный (макс) день
  }
  const avg = baseDaily.reduce((s,v)=> s+v, 0) / Math.max(1, baseDaily.length);
  // work_hours: окно [min..max] часов читающих операций (исключая аномальный объём — берём типичные дни)
  const hours = userEvents.map(e => hourOf(e.ts)).filter(h => !isNaN(h));
  let wStart = 9, wEnd = 18;
  if (hours.length) {
    wStart = Math.min(...hours);
    wEnd = Math.max(...hours) + 1;
    if (wEnd - wStart < 1) wEnd = wStart + 1;
  }
  const knownTables = [...new Set(userEvents.map(e => e.resource).filter(Boolean))];
  return { avg_rows_per_day: Math.max(1, Math.round(avg)), work_hours: [wStart, wEnd], known_tables: knownTables };
}

// Маппинг распарсенного CSV → массив кейсов в форме CASES (по одному на пользователя).
// typology:'uploaded' — НЕ из встроенного множества типологий, поэтому MITRE-бейдж и
// RESPONSE-плейбук просто отсутствуют (graceful). Каждый кейс прогоняется СУЩЕСТВУЮЩИМ analyze().
function buildUploadedCases(events) {
  const byUser = {};
  events.forEach(e => { (byUser[e.user] = byUser[e.user] || []).push(e); });
  const users = Object.keys(byUser);
  const cases = users.map((uid, ui) => {
    const uEvents = byUser[uid];
    const role = uEvents[0].role || 'user';
    const baseline = computeBaselineFromEvents(uEvents);
    const safeId = uid.replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 24);
    const userNodeId = 'UP-U-' + safeId;
    const EGRESS_ID = 'UP-EGRESS';
    // === ВЫБОР INCIDENT-ОКНА ===
    // В граф/скоринг идёт НЕ вся история, а только аномальное окно (пиковый день).
    // Это убирает накладку подписей нескольких read-рёбер: остаётся чистый слепок
    // «крупное чтение → ресурс + выгрузка → egress». baseline по-прежнему из полной истории.
    const dayVol = {}; // день → суммарный объём чтения (SELECT/EXPORT/DOWNLOAD)
    uEvents.forEach(e => {
      if (!['SELECT','EXPORT','DOWNLOAD'].includes(e.action)) return;
      const day = (e.ts || '').slice(0, 10) || 'unknown';
      dayVol[day] = (dayVol[day] || 0) + (e.rows || 0);
    });
    const daysSorted = Object.keys(dayVol).sort((a,b)=> dayVol[b] - dayVol[a]);
    const baseAvg = Math.max(1, baseline.avg_rows_per_day);
    let incidentDays;
    if (!daysSorted.length) {
      // вообще нет читающих событий — берём последний день истории (репрезентативно, не пусто)
      const allDays = [...new Set(uEvents.map(e => (e.ts||'').slice(0,10)).filter(Boolean))].sort();
      incidentDays = allDays.length ? [allDays[allDays.length - 1]] : null;
    } else {
      const peakDay = daysSorted[0];
      const peakVol = dayVol[peakDay];
      // аномалия = пиковый день кратно (≥3×) превышает персональную норму.
      if (peakVol >= 3 * baseAvg) {
        // берём ВСЕ дни с аномальным объёмом (на случай многодневной эксфильтрации),
        // но обычно это один пиковый день → чистый граф.
        incidentDays = daysSorted.filter(d => dayVol[d] >= 3 * baseAvg);
      } else {
        // benign / нет выраженной аномалии (dana.support, svc_etl_nightly):
        // репрезентативная выборка — последний день, чтобы граф был чистым и не пустым.
        const allDays = [...new Set(uEvents.map(e => (e.ts||'').slice(0,10)).filter(Boolean))].sort();
        incidentDays = allDays.length ? [allDays[allDays.length - 1]] : [peakDay];
      }
    }
    const incidentSet = incidentDays ? new Set(incidentDays) : null;
    // окно инцидента: события выбранных дней (или вся история, если день не определился —
    // деградация безопасна, граф всё равно нарисуется)
    const windowEvents = incidentSet
      ? uEvents.filter(e => incidentSet.has((e.ts||'').slice(0,10)))
      : uEvents.slice();
    const incidentEvents = windowEvents.length ? windowEvents : uEvents.slice();

    // ресурсы/хосты/egress графа — СТРОГО из окна инцидента, чтобы узлы совпадали с
    // нарисованными рёбрами (нет «висячих» узлов без рёбер). resource для скоринга не трогаем.
    const hasExfil = incidentEvents.some(e => e.action === 'EXPORT' || e.action === 'DOWNLOAD');
    const resIds = [...new Set(incidentEvents.map(e => e.resource).filter(Boolean))];
    const hostIds = [...new Set(incidentEvents.map(e => e.host).filter(Boolean))];
    const resources = resIds.map(rid =>
      rsc(rid, rid, 'uploaded', 'high', []));
    // выгрузка идёт на отдельный egress-узел графа (данные покидают периметр) — чтение и
    // выгрузка больше не накладывают подписи на один узел.
    if (hasExfil) resources.push(rsc(EGRESS_ID, 'Внешний канал (egress)', 'uploaded', 'critical', []));
    const hosts = hostIds.map(hid => hst(hid, hid, 'office'));

    // события в форме движка: чтение → user→ресурс; выгрузка → user→egress (визуальное
    // разнесение рёбер). Поле resource оставляем исходным, чтобы analyze()/score не менялся.
    const evs = incidentEvents
      .slice()
      .sort((a,b)=> (a.ts||'').localeCompare(b.ts||''))
      .map((e, i) => {
        const exfil = e.action === 'EXPORT' || e.action === 'DOWNLOAD';
        return {
          id: 'UP-E-' + ui + '-' + i,
          from: userNodeId, to: exfil ? EGRESS_ID : e.resource,
          user: userNodeId, role, resource: e.resource, db: 'uploaded',
          host: e.host, ip: e.ip, geo: 'Астана', action: e.action,
          rows: e.rows, ts: e.ts, channel: exfil ? 'cloud' : 'db',
        };
      });
    // totalRead теперь = объём чтения В ОКНЕ инцидента (то, что реально скорится)
    const totalRead = incidentEvents
      .filter(e => ['SELECT','EXPORT','DOWNLOAD'].includes(e.action))
      .reduce((s,e)=> s + (e.rows||0), 0);
    return {
      id: 'UP-' + safeId,
      typology: 'uploaded',
      title: `Загруженный лог · ${uid} (baseline ${fmt(baseline.avg_rows_per_day)}/день, ${uEvents.length} событий)`,
      channel: 'Загруженный access-лог (CSV) · baseline посчитан из этих данных',
      facts: `Пользователь ${uid} (роль: ${role}). Baseline ${fmt(baseline.avg_rows_per_day)} строк/день посчитан из его собственной истории методом leave-one-day-out (аномальный день исключён из нормы). Суммарный объём чтения за окно: ${fmt(totalRead)} строк по ${resIds.length} ресурс(ам). work_hours ${baseline.work_hours[0]}:00–${baseline.work_hours[1]}:00, known_tables: ${baseline.known_tables.join(', ')||'—'}.`,
      source: 'Реальные данные судьи: движок UEBA посчитал персональную норму прямо из загруженного лога (leave-one-day-out), затем прогнал тот же analyze(), что и на встроенных кейсах. Полностью офлайн, без сети.',
      hub: userNodeId,
      uploaded: true,
      users: [ usr(userNodeId, uid + ' (из лога)', role, baseline, []) ],
      resources,
      hosts,
      events: evs,
    };
  });
  return cases;
}

function App() {
  const baseAnalyzed = useMemo(()=> CASES.map(c => ({ cs:c, res:analyze(c) })), []);

  // === ОТДЕЛЬНЫЙ ПУТЬ: загруженные судьёй кейсы (CSV) — аддитивно поверх встроенных ===
  const [uploadedCases, setUploadedCases] = useState([]); // массив cs в форме CASES
  const [uploadOpen, setUploadOpen] = useState(false);
  const [csvText, setCsvText] = useState('');
  const [uploadError, setUploadError] = useState('');
  const uploadedAnalyzed = useMemo(()=> {
    // analyze() обёрнут в try/catch на КАЖДЫЙ кейс: битый кейс не валит остальные и ядро демо.
    return uploadedCases.map(c => {
      try { return { cs:c, res:analyze(c) }; } catch (e) { return null; }
    }).filter(Boolean);
  }, [uploadedCases]);

  // Встроенное демо (baseAnalyzed) НИКОГДА не теряется — загруженные кейсы просто добавляются.
  const analyzed = useMemo(()=> [...baseAnalyzed, ...uploadedAnalyzed], [baseAnalyzed, uploadedAnalyzed]);
  // сортировка очереди по убыванию score (приоритизация)
  const queue = useMemo(()=> [...analyzed].sort((a,b)=> b.res.score - a.res.score), [analyzed]);
  const [selId, setSelId] = useState(baseAnalyzed[0].cs.id);

  const runCsv = (text) => {
    setUploadError('');
    try {
      const events = parseAccessCsv(text);
      const cases = buildUploadedCases(events);
      if (!cases.length) throw new Error('Из лога не удалось собрать ни одного пользователя.');
      setUploadedCases(cases);
      // открыть самый рискованный загруженный инцидент сразу
      const ranked = cases.map(c => ({ cs:c, res:analyze(c) })).sort((a,b)=> b.res.score - a.res.score);
      setSelId(ranked[0].cs.id);
      setMode('incident');
      setUploadOpen(false);
    } catch (e) {
      setUploadError(e.message || 'Не удалось разобрать CSV.');
    }
  };
  const onCsvFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { setCsvText(String(reader.result || '')); runCsv(String(reader.result || '')); };
    reader.onerror = () => setUploadError('Не удалось прочитать файл.');
    reader.readAsText(file);
  };
  const sel = analyzed.find(a => a.cs.id === selId);
  const [alertThreshold, setAlertThreshold] = useState(55); // what-if: порог тревоги (жюри двигает сам)

  // === НАВИГАЦИЯ ПО РЕЖИМАМ: один экран = одна задача ===
  // 'queue' — чистый триаж-лист (default) · 'incident' — деталь одного инцидента · 'validation' — доказательство точности
  const [mode, setMode] = useState('queue');

  const [apiKey, setApiKey] = useState('');
  const [sarText, setSarText] = useState('');
  const [sarLoading, setSarLoading] = useState(false);
  const [sarMode, setSarMode] = useState('');

  useEffect(()=> { setSarText(''); setSarMode(''); }, [selId]);

  // клик по строке очереди → открыть инцидент
  const openIncident = (id) => { setSelId(id); setMode('incident'); };

  // метрики корпуса для жюри: confusion-matrix на ground-truth + recall@top-N + снижение тревог.
  // Всё пересчитывается под порог тревоги alertThreshold (what-if — жюри двигает ползунок).
  const corpusMetrics = useMemo(()=> {
    // ВАЖНО: метрики Валидации считаются ТОЛЬКО по встроенному корпусу (baseAnalyzed),
    // загруженные CSV-кейсы не имеют ground-truth и НЕ должны двигать доказательство точности.
    const total = baseAnalyzed.length;
    const illicit = baseAnalyzed.filter(a => isIllicit(a.cs)).length;
    const benign = total - illicit;
    let TP=0, FP=0, FN=0, TN=0;
    baseAnalyzed.forEach(a => {
      const flagged = a.res.score >= alertThreshold;
      const bad = isIllicit(a.cs);
      if (flagged && bad) TP++; else if (flagged && !bad) FP++;
      else if (!flagged && bad) FN++; else TN++;
    });
    const precision = (TP+FP) ? TP/(TP+FP) : 1;
    const recall = (TP+FN) ? TP/(TP+FN) : 1;
    const f1 = (precision+recall) ? 2*precision*recall/(precision+recall) : 0;
    const accuracy = total ? (TP+TN)/total : 0;
    const alertsShown = TP+FP;
    const ranked = [...baseAnalyzed].sort((a,b)=> b.res.score - a.res.score);
    const hitsTopN = ranked.slice(0, illicit).filter(a => isIllicit(a.cs)).length;
    const recallTopN = illicit ? Math.round((hitsTopN/illicit)*100) : 100;

    // --- AUPRC (area under precision-recall curve) на ранжировании score корпуса ---
    // Считаем честно по 9 точкам: идём по порогу сверху вниз, на каждом TP накапливаем
    // precision×Δrecall (интерполяция прямоугольниками). Не accuracy — при дисбалансе ~0.1%
    // accuracy бесполезна (пустышка = 99.9%). Стандарт для редких инсайдер-событий: AUC-PR.
    let auprc = 0;
    if (illicit) {
      let tp = 0, fp = 0, prevRecall = 0;
      ranked.forEach(a => {
        if (isIllicit(a.cs)) tp++; else fp++;
        const rec = tp / illicit;
        const prec = (tp + fp) ? tp / (tp + fp) : 1;
        auprc += prec * (rec - prevRecall); // прямоугольник precision на шаге recall
        prevRecall = rec;
      });
    } else { auprc = 1; }

    // --- ЧЕСТНЫЙ наивный baseline на ТОМ ЖЕ корпусе (модель периметрового DLP/SIEM) ---
    // Грубое периметровое правило БЕЗ поведенческого baseline: флагает широко по сырому объёму
    // (любой доступ ≥ NAIVE_VOLUME строк) ИЛИ по частоте (≥ NAIVE_EVENTS событий в окне). У такого
    // правила нет понимания персональной нормы, поэтому оно: (1) ловит легит крупнообъёмный ETL/аудит
    // как ЛОЖНУЮ тревогу (FP — отсюда индустриальные ~95% ложных алертов, SOC «тонет в FP») и
    // (2) ПРОПУСКАЕТ тихих инсайдеров — боковое движение, эскалацию привилегий, компрометацию —
    // потому что их объём/частота сами по себе ниже грубых порогов. Сравниваем честно: то же
    // множество инцидентов, тот же ground-truth.
    const NAIVE_VOLUME = 30000; // сырой объёмный порог DLP (без учёта персональной нормы)
    const NAIVE_EVENTS = 5;     // сырой порог частоты/burst
    const naiveFlags = a =>
      a.cs.events.length >= NAIVE_EVENTS || a.cs.events.some(t => t.rows >= NAIVE_VOLUME);
    let naiveTP = 0, naiveFP = 0, naiveFN = 0;
    baseAnalyzed.forEach(a => {
      const flagged = naiveFlags(a), bad = isIllicit(a.cs);
      if (flagged && bad) naiveTP++;
      else if (flagged && !bad) naiveFP++;
      else if (!flagged && bad) naiveFN++;
    });
    const naiveAlerts = naiveTP + naiveFP;
    // Снижение ложных тревог: наш инструмент против наивного DLP (в нашу пользу, без двойного минуса).
    const reduction = naiveFP > 0 ? Math.max(0, Math.round((1 - FP / naiveFP) * 100)) : 0;

    // --- КОНТЕКСТ для AUPRC + ловушка accuracy (всё из уже посчитанных чисел, не выдумано) ---
    // prevalence = доля угроз в корпусе = baseline для случайного ранжировщика (AUPRC_random ≈ prevalence).
    const prevalence = total ? illicit / total : 0;
    // lift = во сколько раз наш AUPRC выше случайного baseline=prevalence.
    const auprcLift = prevalence > 0 ? auprc / prevalence : 0;
    // Наивная пустышка always-benign: НИКОГДА не флагает → ловит 0 угроз, recall 0%, но accuracy = TN-доля.
    const dummyAccuracy = total ? benign / total : 0; // все benign «верны», все illicit пропущены
    return { total, illicit, benign, TP, FP, FN, TN, precision, recall, f1, accuracy, alertsShown,
      recallTopN, naiveAlerts, naiveTP, naiveFP, naiveFN, reduction, auprc,
      prevalence, auprcLift, dummyAccuracy };
  }, [baseAnalyzed, alertThreshold]);

  const genSAR = async () => {
    if (apiKey.trim()) {
      setSarLoading(true); setSarMode('claude');
      try {
        const t = await claudeSAR(sel.cs, sel.res, apiKey.trim());
        setSarText(t);
      } catch (e) {
        setSarText('Ошибка вызова Claude API: ' + e.message + '\n\n--- Показан mock-черновик ---\n\n' + mockSAR(sel.cs, sel.res));
        setSarMode('mock');
      } finally { setSarLoading(false); }
    } else {
      setSarMode('mock');
      setSarText(mockSAR(sel.cs, sel.res));
    }
  };

  // hero-статус: сколько реальных угроз / критических в очереди (одна спокойная строка в шапке)
  const heroStat = useMemo(()=> {
    // встроенные кейсы — по ground-truth (isIllicit); загруженные (typology 'uploaded') не имеют
    // ground-truth, поэтому считаем угрозой только реально флагнутые (score ≥ порога тревоги),
    // иначе чистый загруженный пользователь (score 0) ошибочно попадал бы в счётчик «угроз».
    const threats = queue.filter(({cs,res}) => cs.typology==='uploaded' ? res.score >= 55 : isIllicit(cs)).length;
    const critical = queue.filter(({res}) => res.priority.color === 'crit').length;
    return { threats, critical };
  }, [queue]);

  const TABS = [
    { id:'queue',      label:'Очередь' },
    { id:'incident',   label:'Инцидент' },
    { id:'validation', label:'Валидация' },
  ];

  return (
    <div className="min-h-full flex flex-col">
      {/* ШАПКА — тонкая: лого + один hero-статус + тихие табы. Больше ничего. */}
      <header className="sticky top-0 z-20 bg-ink/85 backdrop-blur border-b border-edge px-8 pt-5 pb-0">
        <div className="max-w-[1180px] mx-auto w-full">
          {/* DFX framed console-bar: identity left · live status chip right */}
          <div className="console-frame rounded-lg px-5 py-3.5 flex items-center justify-between gap-6 flex-wrap bg-panel/40">
            <div className="flex items-center gap-3.5">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" className="shrink-0">
                <path d="M12 2.5 4 5.5v6c0 5 3.4 8.4 8 10 4.6-1.6 8-5 8-10v-6L12 2.5Z" stroke="#38E07B" strokeWidth="1.5" fill="none"/>
                <path d="M8.4 12.2l2.4 2.4 4.8-5" stroke="#38E07B" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              <div className="leading-tight">
                <h1 className="t-head text-[16px] text-ink1">
                  AI<span className="text-accent">/</span>SHIELD
                </h1>
                <p className="t-eyebrow text-[9.5px] text-ink4 mt-1">Insider&nbsp;Guard · UEBA</p>
              </div>
            </div>
            {/* live status chip — threats / critical в очереди */}
            <div className="flex items-center gap-2.5 flex-wrap">
              <span className="pill-green rounded-md px-2.5 py-1.5 t-mono text-[11px]">
                <span className="w-1.5 h-1.5 rounded-full bg-accent beacon text-accent shrink-0"></span>
                <span className="font-bold text-ink1">{heroStat.threats}</span>
                <span className="text-ink3">инсайдер-угроз</span>
                <span className="text-ink5">·</span>
                <span className="font-bold" style={{color:SEV.crit}}>{heroStat.critical}</span>
                <span className="text-ink3">крит.</span>
              </span>
              <span className="text-muted t-mono text-[9.5px] hidden lg:block uppercase tracking-[0.12em]">AFM AI Hackathon 2026 · синтетика</span>
            </div>
          </div>

          {/* ТИХИЕ ТАБЫ — навигация подчёркиванием, mono uppercase */}
          <nav className="flex items-center gap-7 mt-5 -mb-px">
            {TABS.map(t => {
              const on = mode === t.id;
              return (
                <button key={t.id} onClick={()=> setMode(t.id)}
                  className={`relative t-eyebrow text-[11px] pb-3 transition ${on ? 'text-ink1' : 'text-ink4 hover:text-ink2'}`}>
                  {t.label}
                  <span className="absolute left-0 right-0 bottom-0 h-[2px] rounded-full transition"
                    style={{background: on ? '#38E07B' : 'transparent'}}></span>
                </button>
              );
            })}
          </nav>
        </div>
      </header>

      {/* ===== РЕЖИМ 1 — ОЧЕРЕДЬ (default, чистый Linear-лист) ===== */}
      {mode === 'queue' && (
        <main className="flex-1 px-8 py-10 fade-in">
          <div className="max-w-[1180px] mx-auto w-full">

            {/* ===== DFX hero band — тезис продукта, framed console panel ===== */}
            <div className="relative console-frame corner-4 stat-tint rounded-xl px-7 py-8 mb-10 overflow-hidden">
              <span className="ctick tr"></span><span className="ctick bl"></span>
              <span className="pill-green rounded-md px-2.5 py-1 t-eyebrow text-[10px]">
                <span className="w-1.5 h-1.5 rounded-full bg-accent"></span> UEBA · поведенческий детект инсайдера
              </span>
              <h2 className="t-head text-[27px] md:text-[33px] leading-[1.06] text-ink1 mt-5 max-w-[780px]">
                Инсайдер с легальным доступом.<br/>
                <span className="text-accent">Пойман по отклонению от baseline.</span>
              </h2>
              <p className="text-[13px] text-ink3 mt-4 max-w-[580px] leading-relaxed">
                Периметровый DLP/SIEM не видит «легального» доступа. Мы скорим каждое действие против персональной поведенческой нормы самого пользователя.
              </p>
              <div className="flex items-center gap-3 mt-7 flex-wrap">
                <button onClick={()=> openIncident(queue[0].cs.id)} className="btn-green rounded-lg px-5 py-2.5 t-eyebrow text-[11px]">Разобрать топ-инцидент ›</button>
                <button onClick={()=> setMode('validation')} className="btn-ghost rounded-lg px-5 py-2.5 t-eyebrow text-[11px]">Доказательство точности</button>
              </div>
            </div>

            {/* ===== ЗАГРУЗИТЬ СВОЙ ЛОГ (CSV) — отдельный клиентский путь ===== */}
            <div className="flex items-center justify-between mb-3 flex-wrap gap-3">
              <span className="t-eyebrow text-[11px] text-ink3">Свои данные · проверка не на синтетике</span>
              <button onClick={()=> setUploadOpen(o => !o)} className="btn-ghost rounded-lg px-4 py-2 t-eyebrow text-[10.5px]">
                ↓ Загрузить свой лог (CSV)
              </button>
            </div>
            {uploadOpen && (
              <div className="relative console-frame corner-4 stat-tint rounded-xl px-6 py-6 mb-8 overflow-hidden fade-in">
                <span className="ctick tr"></span><span className="ctick bl"></span>
                <p className="t-eyebrow text-[10px] text-accent mb-1.5">Offline · данные не покидают браузер</p>
                <h3 className="t-head text-[16px] text-ink1 mb-2">Дайте движку свой access-лог</h3>
                <p className="text-[12px] text-ink3 leading-relaxed mb-4 max-w-[640px]">
                  Движок посчитает baseline ИЗ ваших данных (leave-one-day-out, аномальный день не раздувает свою норму) и прогонит тот же UEBA-скоринг, что и на встроенных кейсах.
                  Колонки (алиасы рус/англ): <span className="font-mono text-ink2">user, role, resource, action, rows, ts, host, ip</span>.
                </p>
                <textarea value={csvText} onChange={e=> setCsvText(e.target.value)}
                  placeholder={"user,role,resource,action,rows,ts,host,ip\nsabit.a,analyst,DB-PERSONS,SELECT,48,2026-06-08 10:12,WS-12,10.20.4.12"}
                  spellCheck={false}
                  className="w-full h-36 bg-ink/60 border border-edge rounded-lg px-3.5 py-3 text-[11.5px] font-mono text-ink2 outline-none focus:border-accent/60 resize-y leading-relaxed" />
                {uploadError && (
                  <div className="mt-3 rounded-lg px-3.5 py-3 text-[11.5px] leading-relaxed border"
                    style={{borderColor:'rgba(255,97,97,0.4)', background:'rgba(255,97,97,0.07)', color:'#FFB4B4'}}>
                    <span className="font-bold" style={{color:SEV.crit}}>Не удалось разобрать CSV. </span>{uploadError}
                    <span className="block mt-1 text-ink4">Ожидается заголовок + строки. Минимум — колонка user и одна из resource/action/rows.</span>
                  </div>
                )}
                <div className="flex items-center gap-3 mt-4 flex-wrap">
                  <button onClick={()=> runCsv(csvText)} className="btn-green rounded-lg px-5 py-2.5 t-eyebrow text-[11px]">Проанализировать ›</button>
                  <button onClick={()=> { setCsvText(CSV_SAMPLE); setUploadError(''); }} className="btn-ghost rounded-lg px-4 py-2.5 t-eyebrow text-[11px]">Пример</button>
                  <label className="btn-ghost rounded-lg px-4 py-2.5 t-eyebrow text-[10.5px] cursor-pointer">
                    Выбрать .csv-файл
                    <input type="file" accept=".csv,text/csv,text/plain" className="hidden"
                      onChange={e=> onCsvFile(e.target.files && e.target.files[0])} />
                  </label>
                  {uploadedCases.length > 0 && (
                    <button onClick={()=> { setUploadedCases([]); setUploadError(''); }} className="t-mono text-[10.5px] text-ink5 hover:text-ink3 transition ml-1">
                      очистить загруженное
                    </button>
                  )}
                </div>
                {uploadedCases.length > 0 && (
                  <p className="text-[11px] text-accent mt-3 font-mono">✓ загружено пользователей: {uploadedCases.length} — добавлены в очередь ниже</p>
                )}
              </div>
            )}

            {/* заголовок очереди */}
            <div className="flex items-center justify-between mb-3 flex-wrap gap-3">
              <span className="t-eyebrow text-[11px] text-ink3">Очередь триажа · по risk-score</span>
              <span className="t-mono text-[10.5px] text-ink5">{queue.length} инцидентов{uploadedCases.length ? ` · ${uploadedCases.length} из лога` : ''}</span>
            </div>

            {queue.map(({cs,res}, qi) => {
              const c = SEV[res.priority.color];
              const pLabel = res.priority.lvl.split(' ')[0]; // P1/P2/...
              return (
                <button key={cs.id} onClick={()=> openIncident(cs.id)}
                  className="group w-full text-left flex items-center gap-5 py-5 border-b border-edge/60 hover:bg-panel2/40 rounded-lg px-4 -mx-4 transition">
                  {/* тонкий risk-индикатор + score */}
                  <span className="flex items-center gap-3.5 shrink-0 w-[88px]">
                    <span className="w-[3px] h-9 rounded-full shrink-0" style={{background:c, opacity:0.9}}></span>
                    <span className="font-mono font-extrabold text-[26px] leading-none kpi-tick" style={{color:c}}>{res.score}</span>
                  </span>
                  {/* заголовок */}
                  <span className="flex-1 min-w-0">
                    <span className="block text-[15px] text-ink1 font-medium leading-snug truncate group-hover:text-white transition">{cs.title}</span>
                    <span className="block text-[11.5px] text-ink4 font-mono mt-1 truncate">{cs.id} · {cs.channel}</span>
                  </span>
                  {/* 1-2 тега + статус-слово + MITRE-чип */}
                  <span className="hidden md:flex items-center gap-2 shrink-0">
                    {cs.uploaded && (
                      <span className="t-eyebrow text-[9px] leading-none px-2 py-1 rounded border border-accent/40 text-accent" style={{background:'rgba(56,224,123,0.07)'}}>ИЗ ЛОГА</span>
                    )}
                    <MitreBadge cs={cs} size="sm" />
                    <Tag sev={res.priority.color}>{pLabel}</Tag>
                    <span className="text-[11px] font-mono uppercase tracking-wide" style={{color: res.priority.color==='good' ? '#9C9C9D' : c}}>
                      {SEV_LABEL[res.priority.color]}
                    </span>
                  </span>
                  <span className="text-ink5 group-hover:text-ink3 transition shrink-0 text-[18px] leading-none">›</span>
                </button>
              );
            })}
            <p className="text-[11px] text-ink4 mt-8 leading-relaxed">
              Отсортировано по risk-score · самое опасное первым. Клик по строке — разбор инцидента.
            </p>
          </div>
        </main>
      )}

      {/* ===== РЕЖИМ 2 — ИНЦИДЕНТ (по клику) ===== */}
      {mode === 'incident' && sel && (
        <main className="flex-1 px-8 py-10">
          <div className="max-w-[1180px] mx-auto w-full">
            <Detail key={sel.cs.id} cs={sel.cs} res={sel.res}
              apiKey={apiKey} setApiKey={setApiKey} onSelect={openIncident} onBack={()=> setMode('queue')}
              sarText={sarText} sarLoading={sarLoading} sarMode={sarMode} genSAR={genSAR} setSarText={setSarText} />
          </div>
        </main>
      )}

      {/* ===== РЕЖИМ 3 — ВАЛИДАЦИЯ (доказательство точности для питча) ===== */}
      {mode === 'validation' && (
        <main className="flex-1 px-8 py-10 fade-in">
          <div className="max-w-[1180px] mx-auto w-full">
            <Validation threshold={alertThreshold} setThreshold={setAlertThreshold} m={corpusMetrics} />
          </div>
        </main>
      )}
    </div>
  );
}

// одна клетка confusion-matrix — большая, дышащая, без коробки-рамки
function ConfCell({ label, val, color }) {
  return (
    <div className="text-center px-2">
      <div className="font-mono font-extrabold text-[40px] leading-none kpi-tick" style={{ color }}>{val}</div>
      <div className="text-[12px] uppercase tracking-wide text-ink4 leading-tight mt-2.5">{label}</div>
    </div>
  );
}
// одна метрика качества — крупная цифра, спокойная подпись
function ValMetric({ label, value, color, dim }) {
  return (
    <div className="text-center">
      <div className="font-mono font-extrabold text-[34px] leading-none kpi-tick" style={{ color: dim ? '#6A6B6C' : color }}>{value}</div>
      <div className="text-[12px] uppercase tracking-[0.1em] mt-2.5 text-ink4">{label}</div>
    </div>
  );
}

// ===== РЕЖИМ 3: ВАЛИДАЦИЯ — what-if + confusion-matrix + метрики + сравнение с DLP, всё дышит =====
function Validation({ threshold, setThreshold, m }) {
  const pct = v => Math.round(v * 100) + '%';
  const f1col = m.f1 >= 0.99 ? '#59D499' : m.f1 >= 0.8 ? '#FFC533' : '#FF6161';
  return (
    <div className="space-y-14 fade-in">
      {/* заголовок секции */}
      <div>
        <span className="pill-green rounded-md px-2.5 py-1 t-eyebrow text-[10px]">
          <span className="w-1.5 h-1.5 rounded-full bg-accent"></span> Benchmark · ground-truth
        </span>
        <h2 className="t-head text-[26px] text-ink1 mt-4">Доказательство точности</h2>
        <p className="text-[13px] text-ink4 mt-3 max-w-[640px] leading-relaxed">
          Двигайте порог тревоги — метрики пересчитываются вживую на том же корпусе и том же ground-truth.
        </p>
      </div>

      {/* WHAT-IF — широкий, воздушный */}
      <section>
        <div className="flex items-center justify-between mb-5">
          <span className="t-eyebrow text-[11px] text-ink3">What-if · порог тревоги</span>
          <span className="font-mono text-[15px] font-bold" style={{color:'#38E07B'}}>score ≥ {threshold}</span>
        </div>
        <input type="range" min="0" max="100" value={threshold} onChange={e => setThreshold(+e.target.value)} className="soc w-full" />
        <div className="flex justify-between text-[11.5px] text-ink4 mt-2.5 font-mono">
          <span>0 · всё в тревоги (FP↑)</span><span>55 · баланс</span><span>100 · молчим (FN↑)</span>
        </div>
        <p className="text-[12.5px] text-ink3 mt-5 leading-relaxed max-w-[760px]">
          SOC-аналитику показано <span className="text-ink1 font-mono font-semibold">{m.alertsShown}</span> из {m.total} инцидентов — ниже порога подавлено, экономим время.
          Ground-truth: <span className="text-ink1 font-mono">{m.illicit}</span> реальных угроз / <span className="text-ink1 font-mono">{m.benign}</span> легитимных (ETL-сервис, плановый аудит).
        </p>
      </section>

      {/* CONFUSION MATRIX — framed dark-green stat panel (DFX) */}
      <section>
        <span className="t-eyebrow text-[11px] text-ink4">Confusion matrix</span>
        <div className="relative console-frame corner-4 stat-tint rounded-xl px-8 py-9 mt-5 overflow-hidden">
          <span className="ctick tr"></span><span className="ctick bl"></span>
          <div className="flex flex-wrap items-start gap-x-14 gap-y-8">
            <ConfCell label="поймано · TP" val={m.TP} color="#59D499" />
            <ConfCell label="лож. тревог · FP" val={m.FP} color="#FF6161" />
            <ConfCell label="пропуски · FN" val={m.FN} color="#FFC533" />
            <ConfCell label="верно сняты · TN" val={m.TN} color="#9C9C9D" />
          </div>
        </div>
      </section>

      {/* МЕТРИКИ КАЧЕСТВА */}
      <section>
        <span className="t-eyebrow text-[11px] text-ink4">Качество детекта</span>
        <div className="flex flex-wrap items-start gap-x-14 gap-y-8 mt-7">
          <ValMetric label="Precision" value={pct(m.precision)} color={m.precision >= 0.99 ? '#59D499' : '#FFC533'} />
          <ValMetric label="Recall" value={pct(m.recall)} color={m.recall >= 0.99 ? '#59D499' : '#FFC533'} />
          <ValMetric label="F1" value={pct(m.f1)} color={f1col} />
          <ValMetric label="AUPRC" value={m.auprc.toFixed(3)} color="#59D499" />
          <ValMetric label={`Recall@top-${m.illicit}`} value={`${m.recallTopN}%`} color="#59D499" />
          <ValMetric label="accuracy" value={pct(m.accuracy)} color="#6A6B6C" dim />
        </div>
        <p className="text-[12px] text-ink4 mt-7 leading-relaxed max-w-[760px] flex gap-2">
          <span className="shrink-0" style={{color:'#FFC533'}}>⚠</span>
          <span>Инсайдер-события редкие: классификатор-пустышка даёт ~99.9% accuracy и ловит ноль — поэтому метрика качества = AUPRC и recall@top-N, а не accuracy.</span>
        </p>
      </section>

      {/* ЛОВУШКА ACCURACY — side-by-side: пустышка (красным) vs Insider Guard (зелёным) */}
      <section>
        <span className="t-eyebrow text-[11px] text-ink4">Ловушка accuracy · почему 99.9% ничего не значат</span>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mt-5">
          {/* наивная пустышка always-benign — КРАСНЫМ */}
          <div className="relative console-frame corner-4 rounded-xl px-7 py-7 overflow-hidden"
               style={{ background:'#FF61610d', borderColor:'#FF616133' }}>
            <span className="ctick tr"></span><span className="ctick bl"></span>
            <div className="t-eyebrow text-[11.5px]" style={{color:'#FF6161'}}>наивная пустышка · always-benign</div>
            <div className="font-mono font-extrabold text-[44px] leading-none kpi-tick mt-4" style={{color:'#FF6161'}}>
              99.9%
            </div>
            <div className="text-[12px] uppercase tracking-[0.1em] mt-2.5 text-ink4">accuracy при доле угроз ~0.1%</div>
            <div className="flex gap-8 mt-6">
              <div>
                <div className="font-mono font-bold text-[22px] leading-none" style={{color:'#FF6161'}}>0%</div>
                <div className="text-[12px] uppercase tracking-wide text-ink4 mt-1.5">recall</div>
              </div>
              <div>
                <div className="font-mono font-bold text-[22px] leading-none" style={{color:'#FF6161'}}>0 / {m.illicit}</div>
                <div className="text-[12px] uppercase tracking-wide text-ink4 mt-1.5">угроз поймано</div>
              </div>
            </div>
          </div>
          {/* Insider Guard — ЗЕЛЁНЫМ */}
          <div className="relative console-frame corner-4 stat-tint rounded-xl px-7 py-7 overflow-hidden">
            <span className="ctick tr"></span><span className="ctick bl"></span>
            <div className="t-eyebrow text-[11.5px]" style={{color:'#38E07B'}}>Insider Guard · поведенческий UEBA</div>
            <div className="font-mono font-extrabold text-[44px] leading-none kpi-tick mt-4" style={{color:'#59D499'}}>
              {m.recallTopN}%
            </div>
            <div className="text-[12px] uppercase tracking-[0.1em] mt-2.5 text-ink4">recall@top-{m.illicit}</div>
            <div className="flex gap-8 mt-6">
              <div>
                <div className="font-mono font-bold text-[22px] leading-none" style={{color:'#59D499'}}>{pct(m.precision)}</div>
                <div className="text-[12px] uppercase tracking-wide text-ink4 mt-1.5">precision</div>
              </div>
              <div>
                <div className="font-mono font-bold text-[22px] leading-none" style={{color:'#59D499'}}>{m.TP} / {m.illicit}</div>
                <div className="text-[12px] uppercase tracking-wide text-ink4 mt-1.5">поймано @ порог {threshold}</div>
              </div>
            </div>
          </div>
        </div>
        <p className="text-[12px] text-ink4 mt-5 leading-relaxed max-w-[760px]">
          В реальном потоке инсайдер-события — доли процента. При базовом уровне ~0.1% модель,
          которая молчит всегда, «права» в 99.9% случаев и ловит ноль атак. Поэтому честная метрика
          для редких событий — <span className="text-ink2 font-mono">recall@top-N</span> и <span className="text-ink2 font-mono">AUPRC</span>, а не accuracy.
          <span className="block mt-1.5 text-ink5">Демо-корпус курирован для триажа (доля угроз высокая), поэтому цифры пустышки приведены для реального базового уровня ~0.1%.</span>
        </p>
      </section>

      {/* AUPRC С КОНТЕКСТОМ — никогда голое число: baseline=prevalence + lift ×N */}
      <section>
        <span className="t-eyebrow text-[11px] text-ink4">AUPRC в контексте · vs случайный ранжировщик</span>
        <div className="relative console-frame corner-4 stat-tint rounded-xl px-8 py-9 mt-5 overflow-hidden">
          <span className="ctick tr"></span><span className="ctick bl"></span>
          <div className="flex flex-wrap items-end gap-x-12 gap-y-8">
            <div>
              <div className="font-mono font-extrabold text-[40px] leading-none kpi-tick" style={{color:'#59D499'}}>{m.auprc.toFixed(3)}</div>
              <div className="text-[12px] uppercase tracking-[0.1em] mt-2.5 text-ink4">AUPRC · наш</div>
            </div>
            <div className="font-mono text-[26px] text-ink5 leading-none pb-2">vs</div>
            <div>
              <div className="font-mono font-extrabold text-[40px] leading-none kpi-tick text-ink4">{m.prevalence.toFixed(3)}</div>
              <div className="text-[12px] uppercase tracking-[0.1em] mt-2.5 text-ink4">baseline = prevalence</div>
            </div>
            <div>
              <div className="font-mono font-extrabold text-[40px] leading-none kpi-tick" style={{color:'#38E07B'}}>×{m.auprcLift.toFixed(2)}</div>
              <div className="text-[12px] uppercase tracking-[0.1em] mt-2.5 text-ink4">lift над случайным</div>
            </div>
          </div>
        </div>
        <p className="text-[12px] text-ink4 mt-5 leading-relaxed max-w-[760px]">
          Случайный ранжировщик даёт AUPRC ≈ доле угроз (prevalence = {m.prevalence.toFixed(3)} на демо-корпусе). Наш AUPRC {m.auprc.toFixed(3)} —
          в <span className="text-ink2 font-mono">×{m.auprcLift.toFixed(2)}</span> выше этого пола. Голое «AUPRC = {m.auprc.toFixed(3)}» без baseline ничего не говорит — поэтому показываем оба.
          <span className="block mt-1.5 text-ink5">На реальном потоке доля угроз ~0.1% → случайный baseline ≈ 0.001, и AUC-PR становится единственной осмысленной метрикой для редких событий.</span>
        </p>
      </section>

      {/* СРАВНЕНИЕ С НАИВНЫМ DLP */}
      <section>
        <span className="t-eyebrow text-[11px] text-ink4">Против наивного периметрового DLP/SIEM</span>
        <div className="flex flex-wrap items-start gap-x-16 gap-y-8 mt-7">
          <div>
            <div className="font-mono font-extrabold text-[34px] leading-none kpi-tick" style={{color:'#59D499'}}>
              {m.naiveFP} <span className="text-ink5 text-[22px]">→</span> {m.FP}
            </div>
            <div className="text-[12px] uppercase tracking-[0.1em] mt-2.5 text-ink4">ложных тревог{m.reduction>0?` · −${m.reduction}%`:''}</div>
          </div>
          <div>
            <div className="font-mono font-extrabold text-[34px] leading-none kpi-tick" style={{color:'#59D499'}}>
              {m.naiveTP}/{m.illicit} <span className="text-ink5 text-[22px]">→</span> {m.TP}/{m.illicit}
            </div>
            <div className="text-[12px] uppercase tracking-[0.1em] mt-2.5 text-ink4">угроз поймано</div>
          </div>
        </div>
        <p className="text-[12px] text-ink4 mt-7 leading-relaxed max-w-[760px]">
          Грубое периметровое правило флагает легитимный крупнообъёмный ETL/аудит как ложную тревогу (нет персонального baseline) и пропускает тихих инсайдеров — боковое движение, эскалацию привилегий, компрометацию. UEBA ловит по отклонению от персональной нормы.
        </p>

}

// SHA-256 tamper-seal: «Запечатать досье» → хеш + UTC + статус ЦЕЛОСТНОСТЬ ПОДТВЕРЖДЕНА.
// «Подделать запись» меняет rows первого события (+1) в локальном состоянии → пересчёт хеша →
// если ≠ запечатанному → красный pill INTEGRITY BROKEN. Полностью offline/детерминированно.
function TamperSeal({ cs, res }) {
  const [sealedHash, setSealedHash] = useState(null);
  const [sealedAt, setSealedAt] = useState(null);
  const [events, setEvents] = useState(cs.events);
  const [currentHash, setCurrentHash] = useState(null);
  const [tampered, setTampered] = useState(false);
  const [busy, setBusy] = useState(false);

  // при смене инцидента сбрасываем печать
  useEffect(() => {
    setSealedHash(null); setSealedAt(null); setEvents(cs.events);
    setCurrentHash(null); setTampered(false);
  }, [cs.id]);

  const onSeal = async () => {
    setBusy(true);
    try {
      const h = await sealHash(cs, res, cs.events);
      setEvents(cs.events); setTampered(false);
      setSealedHash(h); setCurrentHash(h);
      setSealedAt(new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC');
    } finally { setBusy(false); }
  };

  const onTamper = async () => {
    setBusy(true);
    try {
      // подделываем первое событие: rows +1 — единственная правка, ломающая целостность
      const next = events.map((e, i) => i === 0 ? { ...e, rows: e.rows + 1 } : e);
      setEvents(next); setTampered(true);
      const h = await sealHash(cs, res, next);
      setCurrentHash(h);
    } finally { setBusy(false); }
  };

  // EXPORT — скачать запечатанный артефакт {canonical, sha256, sealedAt} как .json (offline).
  // Канон берём из cs.events (запечатанное состояние), НЕ из подделанного events — артефакт = оригинал печати.
  const onExport = () => {
    const canonical = canonicalIncident(cs, res, cs.events);
    const artifact = {
      incident: cs.id,
      sealedAt: sealedAt,
      sha256: sealedHash,
      algorithm: 'SHA-256',
      canonical: canonical,
      note: 'Запечатанное досье инцидента (chain-of-custody). Хеш воспроизводим бит-в-бит из поля canonical. Все данные синтетические — AFM AI Hackathon 2026.',
    };
    const blob = new Blob([JSON.stringify(artifact, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `dossier-${cs.id}-sealed.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 0);
  };

  const broken = sealedHash && currentHash && currentHash !== sealedHash;
  const fmtHash = (h) => h ? h.match(/.{1,8}/g).join(' ') : '';

  return (
    <div className="relative console-frame corner-4 rounded-xl px-7 py-7 bg-panel/40">
      <span className="ctick tr"></span><span className="ctick bl"></span>
      <div className="flex items-start justify-between gap-4 flex-wrap">
        <div>
          <span className="pill-green rounded-md px-2.5 py-1 t-eyebrow text-[10px]">
            <span className="w-1.5 h-1.5 rounded-full bg-accent"></span> Chain-of-custody · SHA-256
          </span>
          <h3 className="t-head text-[15px] text-ink1 mt-4">Криптографическая печать досье</h3>
          <p className="text-[12px] text-ink4 mt-2 max-w-[520px] leading-relaxed">
            Детерминированный хеш канонизированного инцидента — досье воспроизводимо бит-в-бит, пригодно как доказательство. Полностью офлайн.
          </p>
        </div>
        <div className="flex items-center gap-2.5 shrink-0">
          <button onClick={onSeal} disabled={busy}
            className="btn-green rounded-lg px-5 py-2.5 t-eyebrow text-[11px] disabled:opacity-50">
            {sealedHash ? '↻ Перезапечатать' : 'Запечатать досье'}
          </button>
        </div>
      </div>

      {sealedHash && (
        <div className="mt-6 fade-in">
          {/* статус целостности */}
          <div className="flex items-center gap-2.5 flex-wrap mb-4">
            {broken ? (
              <span className="inline-flex items-center gap-2 text-[11px] leading-none px-3 py-1.5 rounded-md font-mono font-bold uppercase tracking-wide"
                style={{ background:'rgba(255,97,97,0.12)', color:'#FF6161', border:'1px solid rgba(255,97,97,0.5)' }}>
                <span className="w-1.5 h-1.5 rounded-full" style={{background:'#FF6161'}}></span>
                INTEGRITY BROKEN
              </span>
            ) : (
              <span className="inline-flex items-center gap-2 text-[11px] leading-none px-3 py-1.5 rounded-md font-mono font-bold uppercase tracking-wide"
                style={{ background:'rgba(89,212,153,0.12)', color:'#59D499', border:'1px solid rgba(89,212,153,0.5)' }}>
                <span className="w-1.5 h-1.5 rounded-full" style={{background:'#59D499'}}></span>
                Целостность подтверждена
              </span>
            )}
            <span className="font-mono text-[10.5px] text-ink4">{sealedAt}</span>
          </div>

          {/* запечатанный хеш */}
          <div className="space-y-3">
            <div>
              <div className="t-eyebrow text-[9.5px] text-ink5 mb-1.5">Запечатанный SHA-256</div>
              <div className="font-mono text-[11px] leading-relaxed break-all" style={{color: broken ? '#9C9C9D' : '#59D499'}}>
                {fmtHash(sealedHash)}
              </div>
            </div>
            {broken && (
              <div className="fade-in">
                <div className="t-eyebrow text-[9.5px] mb-1.5" style={{color:'#FF6161'}}>Текущий SHA-256 (после правки)</div>
                <div className="font-mono text-[11px] leading-relaxed break-all" style={{color:'#FF6161'}}>
                  {fmtHash(currentHash)}
                </div>
              </div>
            )}
          </div>

          {/* контрол подделки + экспорт запечатанного артефакта */}
          <div className="mt-6 flex items-center gap-3 flex-wrap">
            <button onClick={onExport}
              className="btn-ghost rounded-lg px-4 py-2 t-eyebrow text-[10px]"
              style={{ borderColor:'rgba(56,224,123,0.45)', color:'#38E07B' }}>
              ↓ Скачать досье (.json)
            </button>
            <button onClick={onTamper} disabled={busy}
              className="btn-ghost rounded-lg px-4 py-2 t-eyebrow text-[10px] disabled:opacity-50"
              style={broken ? { borderColor:'rgba(255,97,97,0.55)', color:'#FF6161' } : undefined}>
              ⚠ Подделать запись (rows +1)
            </button>
            {tampered && (
              <span className="text-[11px] font-mono" style={{color: broken ? '#FF6161' : '#9C9C9D'}}>
                {broken
                  ? `Изменено: ${events[0].resource} · rows → ${fmt(events[0].rows)} — хеш не совпал.`
                  : 'Запись изменена.'}
              </span>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// Kill-chain ribbon — горизонтальная лента тактик в порядке kill-chain. Подсвечивает зелёным
// тактики, задетые инцидентом (выводим из typology/MITRE-тактики + триггеров/graphStats).
const KILLCHAIN = ['Initial Access', 'Privilege Escalation', 'Defense Evasion', 'Lateral Movement', 'Collection', 'Exfiltration'];
function touchedTactics(cs, res) {
  const set = new Set();
  const m = mitreFor(cs);
  if (m && KILLCHAIN.includes(m.tactic)) set.add(m.tactic);
  // выводим дополнительные тактики из сработавших триггеров и графа
  const codes = new Set((res.triggers || []).map(t => t.code));
  if (codes.has('LATERAL_MOVEMENT') || res.graphStats.cycle) set.add('Lateral Movement');
  if (codes.has('PRIV_ESCALATION')) set.add('Privilege Escalation');
  if (codes.has('COMPROMISE_INDICATORS')) set.add('Initial Access');
  if (codes.has('VOLUME_ANOMALY') || codes.has('BROAD_ACCESS') || codes.has('SENSITIVE_ACCESS')) set.add('Collection');
  if (codes.has('BULK_EXFIL') || codes.has('STAGING_EXFIL') || codes.has('COVERT_CHANNEL')) set.add('Exfiltration');
  return set;
}
function KillChainRibbon({ cs, res }) {
  const hit = touchedTactics(cs, res);
  return (
    <div>
      <div className="t-eyebrow text-[10px] text-ink5 mb-3">Kill-chain · MITRE ATT&amp;CK</div>
      <div className="flex items-stretch gap-1.5 flex-wrap">
        {KILLCHAIN.map((tac, i) => {
          const on = hit.has(tac);
          return (
            <div key={tac} className="flex items-center gap-1.5">
              <div className="rounded-md px-2.5 py-2 leading-tight transition"
                style={on
                  ? { background:'rgba(56,224,123,0.10)', border:'1px solid rgba(56,224,123,0.42)', color:'#9FE7BC' }
                  : { background:'transparent', border:'1px solid rgba(255,255,255,0.10)', color:'#6A6B6C' }}>
                <div className="flex items-center gap-1.5">
                  {on && <span className="w-1.5 h-1.5 rounded-full shrink-0" style={{background:'#38E07B'}}></span>}
                  <span className="font-mono text-[10px] font-semibold uppercase tracking-wide whitespace-nowrap"
                    style={on ? {color:'#38E07B'} : undefined}>{tac}</span>
                </div>
              </div>
              {i < KILLCHAIN.length - 1 && (
                <span className="text-[12px] leading-none" style={{color: on ? '#38E07B' : '#434345'}}>›</span>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Detail({ cs, res, apiKey, setApiKey, sarText, sarLoading, sarMode, genSAR, onSelect, onBack }) {

          </div>

          <p className="text-[12px] text-ink4 mt-3 font-mono">
            Источник сигнала · <span className="text-ink3">{cs.channel}</span>

          {/* SPEED PROOF — MTTD-контраст: real-time детект vs индустриальный MTTD 241 дней */}

              <span>robust-MAD</span>

        </div>
        {/* robust-MAD z-сводка: «×N от своей нормы · ×M от медианы роли · robust z=…» */}
        {anom.maxZ >= 1 && (
          <p className="text-[11px] font-mono mb-6 leading-snug" style={{color: anom.isAnomaly ? '#9FE7BC' : '#9C9C9D'}}>

              </ol>
            </div>

            {/* ЖУРНАЛ РЕАГИРОВАНИЯ — append-only hash-chain (chain-of-custody действий) */}
            {(
              <div className={`relative console-frame corner-4 rounded-xl px-6 bg-panel/40 fade-in ${auditLog.length === 0 ? 'py-4' : 'py-6'}`}>
                <span className="ctick tr"></span><span className="ctick bl"></span>
                <div className={`flex items-center gap-2.5 flex-wrap ${auditLog.length === 0 ? 'mb-2.5' : 'mb-4'}`}>
                  <span className="pill-green rounded-md px-2.5 py-1 t-eyebrow text-[10px]">
                    <span className="w-1.5 h-1.5 rounded-full bg-accent"></span> Журнал реагирования · hash-chain
                  </span>
                  <span className="font-mono text-[10px] text-ink4">{auditLog.length} звен(о/а)</span>
                </div>
                {auditLog.length === 0 && (
                  <p className="font-mono text-[11px] text-ink4 leading-relaxed">
                    <span className="text-ink5">genesis </span>0000000000000000…
                    <span className="mx-1 text-ink5">→</span>
                    цепочка пуста. Подтвердите действие выше — первое звено запишется в неизменяемый журнал.
                  </p>
                )}
                <ol className="space-y-3">
                  {auditLog.map((a)=> {
                    const tc = SEV[TIERS[a.tier].sev];
                    return (
                      <li key={a.idx} className="flex gap-3 items-start">
                        <span className="shrink-0 font-mono text-[10px] text-ink5 mt-1 w-5">#{a.idx+1}</span>
                        <div className="min-w-0 flex-1">
                          <div className="flex items-center gap-2 flex-wrap">
                            <span className="inline-flex items-center gap-1 text-[9px] leading-none px-1.5 py-1 rounded-md font-mono font-semibold uppercase tracking-wide"
                              style={{ background:tc+'1a', color:tc, border:'1px solid '+tc+'40' }}>
                              <span className="w-1 h-1 rounded-full" style={{background:tc, boxShadow:`0 0 5px ${tc}`}}></span>
                              {TIERS[a.tier].label}</span>
                            <span className="text-[12px] text-ink2 leading-snug">{a.action}</span>
                          </div>
                          <div className="font-mono text-[9.5px] text-ink5 mt-1 break-all leading-relaxed">
                            <span className="text-ink4">{a.ts}</span><br/>
                            <span className="text-ink5">prev </span><span className="text-ink4">{a.prevHash.slice(0,16)}…</span>
                            <span className="mx-1 text-ink5">→</span>
                            <span style={{color:'#38E07B'}}>{a.hash.slice(0,16)}…</span>
                          </div>
                        </div>
                      </li>
                    );
                  })}
                </ol>
                <p className="text-[10px] text-ink5 mt-4 leading-snug">
                  Каждое звено = SHA-256(prevHash · action · ts) — цепочка непрерывна и неизменяема: правка любого шага рвёт хеш всех последующих.
                </p>
              </div>
            )}

            {/* ОПЦИОНАЛЬНО — LLM-генерация черновика отчёта (за toggle). detect→respond→prove виден без кликов выше. */}
            <div>
              <button onClick={()=> setShowReport(v=>!v)}
                className="btn-ghost rounded-lg px-4 py-2 t-eyebrow text-[10px]">
                {showReport ? '− скрыть LLM-черновик отчёта' : '+ LLM-черновик инцидент-отчёта (опц.)'}
              </button>
              {showReport && (
                <div className="mt-5 fade-in">
                  <div className="flex items-center gap-2.5 mb-4 flex-wrap">
                    <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)}
                      placeholder="Anthropic API-ключ (опц.) — иначе mock"
                      className="text-[12px] bg-panel2 border border-edge rounded-lg px-3 py-2 w-64 font-mono text-ink1 placeholder:text-ink4 focus:border-accent outline-none transition" />
                    <button onClick={genSAR} disabled={sarLoading}
                      className="btn-ghost rounded-lg px-4 py-2 t-eyebrow text-[10px] disabled:opacity-50">
                      {sarLoading ? 'Генерация…' : '▸ Собрать черновик'}
                    </button>
                  </div>
                  {sarMode && <p className="text-[10.5px] mb-3 font-mono flex items-center gap-1.5" style={{color: sarMode==='claude'?'#59D499':'#FFC533'}}>
                    <span className="w-1.5 h-1.5 rounded-full" style={{background: sarMode==='claude'?'#59D499':'#FFC533'}}></span>
                    {sarMode==='claude' ? 'Сгенерировано через Claude (claude-opus-4-8)' : 'Mock-режим (детерминированный шаблон, без сети)'}
                  </p>}
                  {sarText
                    ? <pre className="scanline text-[11.5px] text-ink2 whitespace-pre-wrap leading-relaxed bg-panel rounded-xl p-5 border border-edge font-mono fade-in">{sarText}</pre>
                    : <p className="text-[12px] text-ink4 leading-snug">Нажмите «Собрать черновик» — движок соберёт инцидент-отчёт из триггеров (mock) или вызовет Claude, если введён ключ.</p>}
                </div>
              )}
            </div>
          </div>
      </section>

      {/* ДОКАЗАТЕЛЬСТВО — SHA-256 tamper-seal (chain-of-custody) */}
      <section className="mt-14 max-w-[760px]">
        <TamperSeal cs={cs} res={res} />
      </section>

      <p className="text-[10px] text-ink5 mt-16 leading-snug">⚠ Все данные синтетические (ИИН / ФИО / IP вымышлены). Прототип для AFM AI Hackathon 2026.</p>
    </div>
  );
}

function Legend({ c, t }) {
  return (
    <span className="flex items-center gap-1.5 text-[10px] text-ink3">
      <span className="w-2.5 h-2.5 rounded-full" style={{background:c, boxShadow:`0 0 6px ${c}88`}}></span>{t}
    </span>
  );
}
function Stat({ k, v }) {
  return (
    <div className="bg-ink rounded-lg p-2.5 border border-edge">
      <div className="text-[9px] uppercase tracking-[0.1em] text-muted">{k}</div>
      <div className="font-mono font-bold text-[15px] text-ink1 kpi-tick mt-0.5">{v}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
