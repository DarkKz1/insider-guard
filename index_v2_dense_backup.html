  return { id, kind:'resource', label, db, sensitivity, tags };

// Ground-truth: какие инциденты реально нелегитимны (для честных метрик precision/recall).
const BENIGN_TYPOLOGIES = new Set(['etl_service', 'planned_audit']);
const isIllicit = (cs) => !BENIGN_TYPOLOGIES.has(cs.typology);

// Кросс-связь инцидентов через общий скомпрометированный маркер: аккаунты/хосты с tag
// 'compromised' или 'new_device' помечены как ранее фигурировавшие в другом инциденте —
// мост между делами по общему скомпрометированному аккаунту/устройству/IP.
const CROSS_TAGS = ['compromised', 'new_device'];
function relatedCases(cs) {
  const hasCross = (o) =>
    o.users.some(u => (u.tags||[]).some(t => CROSS_TAGS.includes(t))) ||
    o.hosts.some(h => (h.tags||[]).some(t => CROSS_TAGS.includes(t)));
  if (!hasCross(cs)) return [];
  return CASES
    .filter(o => o.id !== cs.id && hasCross(o))
    .map(o => ({ id: o.id, title: o.title }));
}

/* ---------------------------------------------------------------------
   ДЕТЕРМИНИРОВАННЫЙ ДВИЖОК ДЕТЕКТА (mock-AI · UEBA)
   1) Графовые эвристики на adjacency (networkx-эквивалент в JS): доступ user→resource/host
   2) Поведенческие триггеры ОТНОСИТЕЛЬНО baseline пользователя (объём / время / широта / привилегии)
   3) Risk score 0-100 (взвешенная сумма триггеров) + приоритет
   4) SHAP-like вклад каждого фактора (additive contributions)
   --------------------------------------------------------------------- */

const VOLUME_MULT = 80;          // кратность baseline для VOLUME_ANOMALY (×80 — слепок 16M-утечки)
const ABS_VOLUME_FLOOR = 50000;  // абсолютный пол массовой выгрузки при норме <500/день

// Собираем все узлы инцидента в единую map (как buildGraph в AML-версии: agg по рёбрам).
function allNodes(cs) {
  const map = {};
  cs.users.forEach(u => map[u.id] = u);
  cs.resources.forEach(r => map[r.id] = r);
  cs.hosts.forEach(h => map[h.id] = h);
  return map;
}

// buildGraph — переиспользован из AML-каркаса: агрегируем по рёбрам (amount→rows).
// Возвращает узлы с inRows/outRows/inDeg/outDeg (как было inAmt/outAmt/inDeg/outDeg).
function buildGraph(cs) {
  const meta = allNodes(cs);
  const nodes = {};
  Object.values(meta).forEach(a => { nodes[a.id] = { ...a, inRows:0, outRows:0, inDeg:0, outDeg:0 }; });
  cs.events.forEach(t => {
    if (!nodes[t.from]) nodes[t.from] = { id:t.from, kind:'?', label:t.from, tags:[], inRows:0, outRows:0, inDeg:0, outDeg:0 };
    if (!nodes[t.to])   nodes[t.to]   = { id:t.to, kind:'?', label:t.to, tags:[], inRows:0, outRows:0, inDeg:0, outDeg:0 };
    nodes[t.from].outRows += t.rows; nodes[t.from].outDeg++;
    nodes[t.to].inRows   += t.rows;  nodes[t.to].inDeg++;
  });
  return nodes;
}

// поиск пути-цепочки user→host→host→...→resource (DFS, до длины 6) — боковое перемещение.
// Переиспользует AML hasCycle()-механику DFS, но ищет ПУТЬ через ≥3 хоста (а не цикл A→A).
function hasCycle(cs) {
  const adj = {};
  cs.events.forEach(t => { (adj[t.from] = adj[t.from] || []).push(t.to); });
  const meta = allNodes(cs);
  const isHost = (id) => meta[id] && meta[id].kind === 'host';
  const isResource = (id) => meta[id] && meta[id].kind === 'resource';
  const start = Object.keys(adj);
  for (const s of start) {
    const stack = [[s, [s]]];
    while (stack.length) {
      const [n, path] = stack.pop();
      for (const m of (adj[n] || [])) {
        const hostsInPath = path.filter(isHost).length;
        // путь, проходящий через ≥3 хоста и упирающийся в ресурс = боковое перемещение к данным
        if (isResource(m) && hostsInPath >= 3) return path.concat(m);
        if (!path.includes(m) && path.length < 6) stack.push([m, path.concat(m)]);
      }
    }
  }
  return null;
}

function fmt(n) { return new Intl.NumberFormat('ru-RU').format(Math.round(n)); }

// час из ts "YYYY-MM-DD HH:MM"
function hourOf(ts) { return parseInt(ts.slice(11,13), 10); }
// день недели (0=вс..6=сб) из ts
function dowOf(ts) { return new Date(ts.slice(0,10) + 'T00:00:00').getDay(); }

// Главная функция скоринга. Возвращает {score, priority, triggers[], shap[], graphStats, nodes, mitigation}
function analyze(cs) {
  const nodes = buildGraph(cs);
  const nodeArr = Object.values(nodes);
  const triggers = []; // {code, label, weight, detail, severity}

  const add = (code, label, weight, detail, severity='warn') =>
    triggers.push({ code, label, weight, detail, severity });

  // baseline владельца инцидента (пользователь-хаб)
  const owner = cs.users.find(u => u.id === cs.hub) || cs.users[0];
  const bl = (owner && owner.baseline) || { avg_rows_per_day: 500, work_hours: [9,18], known_tables: [] };
  const userEvents = cs.events.filter(e => e.user === (owner && owner.id));

  // суммарный объём чтения/выгрузки пользователя за окно инцидента
  const readRows = userEvents
    .filter(e => ['SELECT','EXPORT','DOWNLOAD'].includes(e.action))
    .reduce((s,e)=> s + e.rows, 0);
  const exportEvents = userEvents.filter(e => ['EXPORT','DOWNLOAD'].includes(e.action));
  const exportRows = exportEvents.reduce((s,e)=> s + e.rows, 0);
  const selectRows = userEvents.filter(e => e.action === 'SELECT').reduce((s,e)=> s + e.rows, 0);

  // --- ПОВЕДЕНЧЕСКОЕ: VOLUME_ANOMALY (массовая выгрузка относительно baseline) ---
  // мьютекс-флаг: на каком пользователе сработала объёмная аномалия (чтобы BROAD_ACCESS,
  // считающий «много ресурсов», не дублировал объёмный сигнал на том же узле — взаимоисключение).
  let volumeHub = null;
  const overMult = readRows > VOLUME_MULT * Math.max(1, bl.avg_rows_per_day);
  const overFloor = readRows >= ABS_VOLUME_FLOOR && bl.avg_rows_per_day < 500;
  if (overMult || overFloor) {
    volumeHub = owner.id;
    const mult = (readRows / Math.max(1, bl.avg_rows_per_day)).toFixed(0);
    add('VOLUME_ANOMALY', 'Аномальный объём выгрузки', 28,
      `Пользователь ${owner.id} обратился к ${fmt(readRows)} строкам при персональном baseline ${fmt(bl.avg_rows_per_day)}/день (×${mult}). Объём несовместим с должностными обязанностями — слепок массовой эксфильтрации.`, 'bad');
  } else if (readRows >= ABS_VOLUME_FLOOR) {
    // МЯГКИЙ объёмный сигнал: крупный абсолютный объём, который НЕ является аномалией относительно
    // персонального baseline (например established / сервисный ETL-бэкап с легитимно крупным ночным
    // профилем). Грубый периметровый DLP пометил бы такой объём; UEBA — лишь мягко, давая контексту
    // (established/service_account, см. mitigation ниже) подавить тревогу. Взаимоисключение с
    // жёстким VOLUME_ANOMALY (тот же объём не считается дважды).
    volumeHub = owner.id;
    const nightCtx = userEvents.some(e => { const h = hourOf(e.ts); return h < 6 || h >= 22; });
    add('VOLUME_SOFT', 'Крупный объём доступа', 16,
      `Пользователь ${owner.id} обратился к ${fmt(readRows)} строкам${nightCtx ? ' в ночном окне' : ''} — крупный абсолютный объём, но в пределах персонального baseline ${fmt(bl.avg_rows_per_day)}/день (без кратного превышения). Сигнал требует контекстной проверки, а не автоматической эскалации.`, 'warn');
  }

  // --- ГРАФ: LATERAL_MOVEMENT (боковое перемещение через ≥3 хоста до ресурса) ---
  const path = hasCycle(cs);
  if (path) {
    add('LATERAL_MOVEMENT', 'Боковое перемещение', 30,
      `Обнаружена цепочка доступа: ${path.join(' → ')}. Аккаунт прыгает по ${path.filter(id => (nodes[id]||{}).kind==='host').length} хостам до базы данных — обход сегментации сети, почерк скомпрометированного аккаунта.`, 'crit');
  }

  // --- ГРАФ: BROAD_ACCESS (аномально широкий доступ к новым ресурсам, scatter-gather) ---
  // считаем уникальные ресурсы вне known_tables, к которым обращался пользователь.
  const knownDbs = new Set((bl.known_tables || []));
  const touchedResources = new Set(
    userEvents.filter(e => (nodes[e.resource]||{}).kind === 'resource').map(e => e.resource)
  );
  const newResources = [...touchedResources].filter(rid => !knownDbs.has(rid));
  // BROAD_ACCESS добавляем ТОЛЬКО если на этом же пользователе НЕ сработала объёмная аномалия
  // (volumeHub) — иначе один и тот же всплеск активности считается дважды. Взаимоисключение
  // (аналог FAN_IN ⊥ STRUCTURING в AML-каркасе).
  let broadHub = null; // на каком узле сработал «широкий/выходящий за профиль» доступ
  if (newResources.length >= 5 && owner.id !== volumeHub) {
    broadHub = owner.id;
    add('BROAD_ACCESS', 'Аномально широкий доступ', 32,
      `Пользователь ${owner.id} обратился к ${newResources.length} ресурсам вне своего профиля (known_tables: ${[...knownDbs].join(', ')||'—'}). Веерный сбор по множеству БД (scatter-gather) — разведка данных перед эксфильтрацией.`, 'crit');
  } else if (newResources.length >= 1 && newResources.length < 5 && owner.id !== volumeHub) {
    // Доступ к 1-4 ресурсам вне профиля (sub-BROAD_ACCESS): слабее веерного сбора, но всё ещё
    // выход за known_tables. Взаимоисключение с BROAD_ACCESS и VOLUME_ANOMALY на том же узле —
    // тот же выход-за-профиль не считается дважды.
    broadHub = owner.id;
    const sens = newResources.map(rid => (nodes[rid]||{}).sensitivity).filter(s=>s==='critical' || s==='high');
    add('SENSITIVE_ACCESS', 'Доступ к ресурсу вне профиля роли', 12,
      `Пользователь ${owner.id} обратился к ${newResources.length} ресурс(у/ам) вне своего профиля (known_tables: ${[...knownDbs].join(', ')||'—'})${sens.length?`, из них ${sens.length} высокой/критической чувствительности`:''}. Чтение данных, не положенных роли.`, 'bad');
  }

  // --- ПОВЕДЕНЧЕСКОЕ: BULK_EXFIL (молниеносная выгрузка наружу после массового чтения) ---
  if (exportEvents.length >= 2 || (exportEvents.length >= 1 && selectRows >= ABS_VOLUME_FLOOR)) {
    add('BULK_EXFIL', 'Молниеносная выгрузка наружу', 24,
      `${exportEvents.length} операц(ия/ий) EXPORT/download (${fmt(exportRows)} строк) сразу после массового чтения. Данные покидают периметр — активная эксфильтрация.`, 'crit');
  }

  // --- ПОВЕДЕНЧЕСКОЕ: OFF_HOURS_VELOCITY (операции вне work_hours / выходные + всплеск) ---
  const [wStart, wEnd] = bl.work_hours || [9,18];
  // сервисный ночной job (night_job) не штрафуем за ночь — это его норма
  const offHoursEvents = userEvents.filter(e => {
    if (bl.night_job) return false;
    const h = hourOf(e.ts), d = dowOf(e.ts);
    const weekend = (d === 0 || d === 6);
    const outsideHours = h < wStart || h >= wEnd;
    return weekend || outsideHours;
  });
  const burst = userEvents.length >= 3 || readRows > 3 * Math.max(1, bl.avg_rows_per_day);
  if (offHoursEvents.length >= 1 && burst) {
    add('OFF_HOURS_VELOCITY', 'Активность вне рабочих часов + всплеск', 20,
      `${offHoursEvents.length} операц(ия/ий) вне work_hours ${wStart}:00–${wEnd}:00 / в выходной, на фоне всплеска активности. Поведение вне персонального профиля времени.`, 'bad');
  }

  // --- ПОВЕДЕНЧЕСКОЕ: PRIV_ESCALATION (GRANT/SUDO/смена роли вне процесса заявок) ---
  const escEvents = userEvents.filter(e => ['GRANT','SUDO','ROLE_CHANGE'].includes(e.action));
  if (escEvents.length >= 1) {
    add('PRIV_ESCALATION', 'Эскалация привилегий вне заявок', 26,
      `${escEvents.length} операц(ия/ий) ${[...new Set(escEvents.map(e=>e.action))].join('/')} без зарегистрированной заявки. Повышение прав вне процесса — шаг подготовки к несанкционированному доступу.`, 'crit');
  }

  // --- ПОВЕДЕНЧЕСКОЕ: COMPROMISE_INDICATORS (новый гео/устройство + impossible travel) ---
  const homeGeo = bl.home_geo || 'Астана';
  const foreignLogins = userEvents.filter(e => e.action === 'LOGIN' && e.geo && e.geo !== homeGeo && !e.geo.startsWith(homeGeo));
  const newDevice = userEvents.some(e => (nodes[e.host]||{}).tags?.includes('new_device'));
  // impossible travel: два логина из разных гео в окне ≤ 60 мин
  let impossible = false;
  const logins = userEvents.filter(e => e.action === 'LOGIN').sort((a,b)=> a.ts.localeCompare(b.ts));
  for (let i=1;i<logins.length;i++) {
    if (logins[i].geo !== logins[i-1].geo) {
      const dt = (new Date(logins[i].ts.replace(' ','T')) - new Date(logins[i-1].ts.replace(' ','T'))) / 60000;
      if (dt >= 0 && dt <= 60) impossible = true;
    }
  }
  if ((foreignLogins.length >= 1 && (newDevice || impossible))) {
    add('COMPROMISE_INDICATORS', 'Индикаторы компрометации (новый гео/устройство)', 22,
      `Логин из нового гео (${[...new Set(foreignLogins.map(e=>e.geo))].join(', ')})${newDevice?' с нового устройства':''}${impossible?', impossible travel (<60 мин между гео)':''}, затем аномальный доступ. Учётные данные вероятно скомпрометированы (фишинг-вектор).`, 'bad');
  }

  // --- ПОВЕДЕНЧЕСКОЕ: STAGING_EXFIL (прочитал ≈ выгрузил наружу, near-zero оседание) ---
  // passthrough-примитив: объём чтения ≈ объёму выгрузки (как passthrough в AML, но rows).
  if (selectRows > 0 && exportRows > 0 && Math.abs(selectRows - exportRows) / selectRows < 0.12) {
    add('STAGING_EXFIL', 'Стейджинг под эксфильтрацию (≈1:1 чтение→выгрузка)', 18,
      `Прочитано ${fmt(selectRows)} ≈ выгружено ${fmt(exportRows)} строк (оседание ≈0). Данные не используются, а перекачиваются наружу — стейджинг под эксфильтрацию.`, 'bad');
  }

  // --- ПОВЕДЕНЧЕСКОЕ: COVERT_CHANNEL (выгрузка в облако/мессенджер/личную почту) ---
  const covertEvents = userEvents.filter(e => ['cloud','messenger','personal_email'].includes(e.channel) && ['EXPORT','DOWNLOAD'].includes(e.action));
  if (covertEvents.length >= 1) {
    const channelFlagged = cs.hosts.some(h => (h.tags||[]).includes('flagged_channel')) ||
      cs.users.some(u => (u.tags||[]).includes('flagged_channel'));
    const w = channelFlagged ? 24 : 12;
    add('COVERT_CHANNEL', 'Выгрузка по скрытому каналу', w,
      `${covertEvents.length} выгрузк(а/и) через ${[...new Set(covertEvents.map(e=>e.channel))].join('/')} (облако/мессенджер/личная почта)${channelFlagged?'. Канал РАНЕЕ помечен в другом инциденте (×2).':'.'} Обход корпоративных каналов передачи данных.`, channelFlagged ? 'bad' : 'warn');
  }

  // --- если ничего не сработало — легитимная активность ---
  if (triggers.length === 0) {
    add('CLEAN', 'Аномалий не выявлено', 0,
      'Активность соответствует персональному baseline (объём, время, набор ресурсов в норме). Несанкционированного доступа не выявлено — ложная тревога не сформирована.', 'good');
  }

  // --- SCORE: сумма весов → 0-100 с насыщением + контекст-снижение для established-аккаунтов ---
  const sumW = triggers.reduce((s,t)=> s + t.weight, 0);
  // established = аккаунт с устоявшимся стабильным baseline (сервисные ETL/бэкап, давно работающий
  // аналитик). Снижаем риск ТОЛЬКО если нет жёстких крит-кодов (боковое движение / выгрузка наружу /
  // эскалация привилегий) — иначе established не должен спасать от реальной угрозы.
  const established = cs.users.some(u => (u.tags || []).includes('established') || (u.tags || []).includes('service_account'));
  const hardCrit = triggers.some(t => ['LATERAL_MOVEMENT','BULK_EXFIL','PRIV_ESCALATION'].includes(t.code));
  let mitigation = null, effRaw = sumW;
  if (established && !hardCrit && sumW > 0) {
    effRaw = sumW * 0.45;
    mitigation = { factor: 0.45, note: 'Аккаунт с устоявшимся стабильным baseline (established / сервисный ETL-бэкап) и без жёстких крит-индикаторов (боковое движение / выгрузка наружу / эскалация привилегий) → контекст снижает риск, чтобы не штрафовать легитимную регулярную работу.' };
  }
  // ВАЖНО: никакого clamp по ground-truth label (никакой "if benign → score↓") —
  // это была бы утечка целевой переменной. Score определяется ТОЛЬКО триггерами движка.
  let score = Math.round(100 * (1 - Math.exp(-effRaw / 38)));
  score = Math.max(0, Math.min(100, score));

  // --- SHAP-like: вклад каждого триггера в финальный score (additive). ---
  // Largest-remainder (Hamilton): целочисленные доли, сумма которых ТОЧНО === score
  // (обычный Math.round по каждому даёт sum≠score из-за ошибок округления).
  const shapBase = triggers.filter(t => t.weight > 0);
  let shap = [];
  if (shapBase.length && sumW) {
    const quotas = shapBase.map(t => ({ t, exact: (t.weight / sumW) * score }));
    quotas.forEach(q => { q.floor = Math.floor(q.exact); q.rem = q.exact - q.floor; });
    let assigned = quotas.reduce((s, q) => s + q.floor, 0);
    let leftover = score - assigned; // сколько целых очков ещё раздать
    // раздаём остаток по убыванию дробной части (largest remainder)
    [...quotas].sort((a, b) => b.rem - a.rem).forEach(q => {
      if (leftover > 0) { q.floor += 1; leftover -= 1; }
    });
    shap = quotas
      .map(q => ({ ...q.t, contribution: q.floor }))
      .sort((a, b) => b.contribution - a.contribution);
  }

  // приоритет
  let priority;
  if (score >= 80) priority = { lvl:'P1 — Критический', color:'crit', note:'Немедленное реагирование SOC / отзыв сессии' };
  else if (score >= 55) priority = { lvl:'P2 — Высокий', color:'bad', note:'В очередь на расследование в течение суток' };
  else if (score >= 30) priority = { lvl:'P3 — Средний', color:'warn', note:'Плановая проверка / накопление сигналов' };
  else priority = { lvl:'P4 — Низкий', color:'good', note:'Мониторинг без действий' };

  const graphStats = {
    nodes: nodeArr.length,
    edges: cs.events.length,
    totalRows: cs.events.reduce((s,t)=> s+t.rows, 0),
    hubId: cs.hub,
    cycle: path, // путь бокового перемещения (переиспользуем поле для GraphView)
  };

  return { score, priority, triggers, shap, graphStats, nodes, mitigation };
}

  const trg = res.triggers.filter(t=>t.weight>0).map(t=>`• ${t.label}: ${t.detail}`).join('\n');
  const recs = (RESPONSE[cs.typology]||[]).map((r,i)=>`${i+1}. ${r}`).join('\n');
  const timeline = cs.events.map(e=> `   ${e.ts} · ${e.user} · ${e.action} · ${e.resource} · ${e.rows?fmt(e.rows)+' строк':'—'} · ${e.geo} (${e.ip})`).join('\n');
  return `ЧЕРНОВИК ИНЦИДЕНТ-ОТЧЁТА (Incident Response) — ${cs.id}
Дата формирования: 2026-06-14 | Сформировано автоматически SOC-движком, требует проверки аналитиком.

1. РЕЗЮМЕ ИНЦИДЕНТА. По учётной записи «${cs.hub}» (источник сигнала: ${cs.channel}) выявлены признаки несанкционированной/аномальной активности привилегированного пользователя. Присвоен risk-score ${res.score}/100, приоритет ${res.priority.lvl}. Тип инцидента: ${cs.title}.

2. ХРОНОЛОГИЯ СОБЫТИЙ:
${timeline}

3. ЗАТРОНУТЫЕ РЕСУРСЫ И ОБЪЁМ ДАННЫХ. В графе доступа ${res.graphStats.nodes} узлов (пользователи/ресурсы/хосты), ${res.graphStats.edges} событий, совокупный объём доступа ${fmt(res.graphStats.totalRows)} строк. Ключевой узел: ${res.graphStats.hubId}.${res.graphStats.cycle ? ' Обнаружена цепочка бокового перемещения.' : ''}

4. ИНДИКАТОРЫ (триггеры детект-движка UEBA):
${trg}

5. ОБСТОЯТЕЛЬСТВА. ${cs.facts}

6. РЕКОМЕНДАЦИИ ПО РЕАГИРОВАНИЮ / СДЕРЖИВАНИЮ:
${recs}

Примечание: документ — машинный черновик для ускорения работы SOC/инцидент-аналитика. Не является процессуальным решением. Все данные в прототипе синтетические (ИИН/ФИО/IP вымышлены).`;
}

async function claudeSAR(cs, res, apiKey) {
  const sys = `Ты — SOC / инцидент-аналитик (информационная безопасность гос-органа РК). Составь сжатый, формальный черновик ИНЦИДЕНТ-ОТЧЁТА (Incident Response) на русском языке по данным детект-движка UEBA. Структура: резюме инцидента, хронология событий, затронутые ресурсы и объём данных, индикаторы компрометации, рекомендации по реагированию/сдерживанию. Без воды, технически-точный тон, не выдумывай фактов сверх данных. Это синтетические данные для прототипа.`;
  const user = `Инцидент ${cs.id}. Тип: ${cs.title}. Источник сигнала: ${cs.channel}.
Обстоятельства: ${cs.facts}
Risk-score: ${res.score}/100, приоритет ${res.priority.lvl}.
Хронология:\n${cs.events.map(e=>`- ${e.ts} ${e.user} ${e.action} ${e.resource} ${e.rows?fmt(e.rows)+' строк':''} ${e.geo} ${e.ip}`).join('\n')}
Индикаторы (триггеры):\n${res.triggers.filter(t=>t.weight>0).map(t=>`- ${t.label}: ${t.detail}`).join('\n')}
Граф доступа: ${res.graphStats.nodes} узлов, ${res.graphStats.edges} событий, объём ${fmt(res.graphStats.totalRows)} строк.`;
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1100,
      system: sys,
      messages: [{ role:'user', content: user }],
    }),
  });
  if (!r.ok) throw new Error('API ' + r.status + ': ' + (await r.text()).slice(0,200));
  const j = await r.json();
  return j.content?.map(c=>c.text).join('') || '(пустой ответ)';
}

function GraphView({ cs, res }) {
  const W = 720, H = 460;
  const nodes = res.nodes;
  const ids = Object.keys(nodes);
  const hub = cs.hub;

  // --- РЁБРА критического пути (горящего): cycle для lateral, иначе все рёбра хаба к ресурсам ---
  const critEdgeSet = new Set();
  const critNodeSet = new Set([hub]);
  if (res.graphStats.cycle) {
    const c = res.graphStats.cycle;
    for (let i=0;i<c.length-1;i++){ critEdgeSet.add(c[i]+'>'+c[i+1]); critNodeSet.add(c[i]); critNodeSet.add(c[i+1]); }
  } else {
    cs.events.forEach(t => { if (t.from===hub || t.to===hub){ critEdgeSet.add(t.from+'>'+t.to); critNodeSet.add(t.from); critNodeSet.add(t.to); } });
  }

  // --- LAYOUT по слоям: вход → пользователь → хост(ы) → ресурс (читается как поток слева-направо) ---
  const positions = {};
  const colX = [70, 235, 400, 555, 655]; // слои
  const isHostId = (id) => (nodes[id]||{}).kind === 'host';
  const isResId  = (id) => (nodes[id]||{}).kind === 'resource';

  if (res.graphStats.cycle) {
    // боковое движение: строго линейная цепочка вдоль X (вход→хост→хост→...→ресурс)
    const chain = res.graphStats.cycle;
    const inChain = new Set(chain);
    const step = (W - 120) / Math.max(1, chain.length - 1);
    chain.forEach((id, i) => { positions[id] = { x: 60 + step*i, y: H*0.42 }; });
    // user-хаб над началом цепочки
    if (!inChain.has(hub)) positions[hub] = { x: 60, y: H*0.42 - 80 };
    // прочие узлы (контекст) — нижним рядом
    const rest = ids.filter(id => !positions[id]);
    rest.forEach((id,i)=> positions[id] = { x: 90 + i*((W-160)/Math.max(1,rest.length)), y: H-70 });
  } else {
    // слоистый: user слева, хосты в середине, ресурсы справа
    positions[hub] = { x: colX[1], y: H/2 };
    const hostIds = ids.filter(id => id!==hub && isHostId(id));
    const resIds  = ids.filter(id => id!==hub && isResId(id));
    const otherUsers = ids.filter(id => id!==hub && (nodes[id]||{}).kind==='user');
    const place = (arr, x, yPad=50) => {
      const n = arr.length; const gap = (H - 2*yPad) / Math.max(1, n);
      const cols = n > 7 ? 2 : 1; const perCol = Math.ceil(n/cols);
      arr.forEach((id,i)=>{
        const col = Math.floor(i/perCol), row = i%perCol;
        const rn = Math.min(perCol, n - col*perCol);
        const g = (H - 2*yPad)/Math.max(1, rn);
        positions[id] = { x: x + col*52, y: yPad + g*row + g/2 };
      });
    };
    place(hostIds, colX[2]);
    place(resIds, colX[3] + (hostIds.length?40:0));
    otherUsers.forEach((id,i)=> positions[id] = { x: colX[0], y: 80 + i*70 });
    if (resIds.length && !hostIds.length) {
      // прямой user→resource: ресурсы дальше вправо для длинного «предложения»
      place(resIds, colX[3]);
    }
  }
  ids.forEach(id => { if(!positions[id]) positions[id] = { x: 60+Math.random()*(W-120), y: 60+Math.random()*(H-120) }; });

  // цвет узла: на критическом пути — статус-цвет по типу; контекст — нейтральный серый (dim)
  const NEUTRAL = '#6A6B6C';
  const colorFor = (id) => {
    if (!critNodeSet.has(id)) return NEUTRAL;     // контекст вне горящего пути — серый
    const n = nodes[id];
    if (id === hub) return '#FF6161';             // хаб — critical red (цель/источник)
    if (n.kind === 'resource') return '#FF6161';  // crown-jewel ресурс на пути
    if (n.kind === 'host') return '#FFC533';      // хост на пути — warning
    return '#57C1FF';                             // user на пути — active
  };
  // риск-радиус: узлы на пути крупнее; ресурс-цель и хаб самые крупные
  const radiusFor = (id) => {
    const onPath = critNodeSet.has(id);
    if (id === hub) return 24;
    if (isResId(id)) return onPath ? 20 : 12;
    if (isHostId(id)) return onPath ? 16 : 11;
    return onPath ? 15 : 11;
  };

  // curved path между двумя точками (квадратичная Безье — параллельные рёбра не сливаются)
  const curve = (a, b, bend) => {
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
    const nx=-dy/len, ny=dx/len;
    return `M ${a.x} ${a.y} Q ${mx+nx*bend} ${my+ny*bend} ${b.x} ${b.y}`;
  };

  // счётчики для легенды
  const cnt = { user:0, host:0, resource:0 };
  ids.forEach(id => { const k=(nodes[id]||{}).kind; if(cnt[k]!==undefined) cnt[k]++; });

  return (
    <div>
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto rounded-lg" style={{background:'#0D0D0D', border:'1px solid rgba(255,255,255,0.08)'}}>
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
          <path d="M0,0 L6,3 L0,6 Z" fill="#6A6B6C" />
        </marker>
        <marker id="arrC" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto">
          <path d="M0,0 L7,3 L0,6 Z" fill="#FF6161" />
        </marker>
        {/* эскалация к цели: жёлтый → красный вдоль critical-пути */}
        <linearGradient id="critEdge" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stopColor="#FFC533"/>
          <stop offset="100%" stopColor="#FF6161"/>
        </linearGradient>
      </defs>

      {/* РЁБРА: сперва контекст (dim), затем critical поверх */}
      {cs.events.filter(t=>!critEdgeSet.has(t.from+'>'+t.to)).map((t,i)=>{
        const a=positions[t.from], b=positions[t.to]; if(!a||!b) return null;
        const bend = ((i%2)?1:-1) * (14 + (i%3)*6);
        return <path key={'c'+i} d={curve(a,b,bend)} fill="none" stroke="#2A2A2B" strokeWidth="1.3" markerEnd="url(#arr)" opacity="0.7"/>;
      })}
      {cs.events.filter(t=>critEdgeSet.has(t.from+'>'+t.to)).map((t,i)=>{
        const a=positions[t.from], b=positions[t.to]; if(!a||!b) return null;
        const bend = ((i%2)?1:-1) * 16;
        const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
        const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
        const nx=-dy/len, ny=dx/len;
        const lx=mx+nx*(bend+ (bend>0?9:-9)), ly=my+ny*(bend+(bend>0?9:-9));
        const rel = REL_LABEL[t.action] || t.action.toLowerCase();
        const sub = t.rows ? `${fmt(t.rows)} строк` : '';
        return (
          <g key={'h'+i}>
            <path d={curve(a,b,bend)} fill="none" stroke="url(#critEdge)" strokeWidth="2.6" markerEnd="url(#arrC)" strokeLinecap="round"/>
            <text x={lx} y={ly-2} textAnchor="middle" fill="#F4F4F6" fontSize="11.5" fontFamily="Inter, sans-serif" fontWeight="600"
              style={{paintOrder:'stroke', stroke:'#0D0D0D', strokeWidth:'3.5px', strokeLinejoin:'round'}}>{rel}</text>
            {sub && <text x={lx} y={ly+10} textAnchor="middle" fill="#FFC533" fontSize="10" fontFamily="'JetBrains Mono', monospace" fontWeight="600"
              style={{paintOrder:'stroke', stroke:'#0D0D0D', strokeWidth:'3.5px', strokeLinejoin:'round'}}>{sub}</text>}
          </g>
        );
      })}

      {/* УЗЛЫ */}
      {ids.map(id => {
        const p=positions[id], n=nodes[id]; const isHub=id===hub;
        const onPath=critNodeSet.has(id);
        const r=radiusFor(id), col=colorFor(id);
        const op = onPath ? 1 : 0.5;
        return (
          <g key={id} opacity={op}>
            {isHub && (
              <circle cx={p.x} cy={p.y} r={r+8} fill="none" stroke="#FF6161" strokeWidth="1.3" opacity="0.4">
                <animate attributeName="r" values={`${r+5};${r+14};${r+5}`} dur="2.4s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.45;0;0.45" dur="2.4s" repeatCount="indefinite"/>
              </circle>
            )}
            <circle cx={p.x} cy={p.y} r={r} fill={onPath ? col+'1f' : '#161616'} stroke={col} strokeWidth={isHub?2.4:1.8}/>
            <g transform={`translate(${p.x},${p.y})`}>
              <NodeGlyph kind={n.kind} color={col} s={r/13} />
            </g>
            <text x={p.x} y={p.y + r + 13} textAnchor="middle" fill={onPath?'#F4F4F6':'#6A6B6C'}
              fontSize={onPath?12:11} fontFamily="'JetBrains Mono', monospace" fontWeight={onPath?700:500}
              style={{paintOrder:'stroke', stroke:'#0D0D0D', strokeWidth:'3px', strokeLinejoin:'round'}}>{id}</text>
          </g>
        );
      })}
    </svg>
    {/* ПЕРСИСТЕНТНАЯ ЛЕГЕНДА со счётчиками — жюри декодирует без нарратива */}
    <div className="flex flex-wrap items-center gap-x-3 gap-y-1.5 mt-3 text-[11px]">
      <span className="flex items-center gap-1.5 font-mono" style={{color:'#57C1FF'}}>
        <svg width="13" height="13" viewBox="-8 -8 16 16"><NodeGlyph kind="user" color="#57C1FF" s={0.85}/></svg>
        <span className="font-bold mono-num">{cnt.user}</span><span className="text-ink3">польз.</span>
      </span>
      <span className="flex items-center gap-1.5 font-mono" style={{color:'#FFC533'}}>
        <svg width="13" height="13" viewBox="-8 -8 16 16"><NodeGlyph kind="host" color="#FFC533" s={0.85}/></svg>
        <span className="font-bold mono-num">{cnt.host}</span><span className="text-ink3">хостов</span>
      </span>
      <span className="flex items-center gap-1.5 font-mono" style={{color:'#FF6161'}}>
        <svg width="13" height="13" viewBox="-8 -8 16 16"><NodeGlyph kind="resource" color="#FF6161" s={0.85}/></svg>
        <span className="font-bold mono-num">{cnt.resource}</span><span className="text-ink3">ресурсов (БД ПДн)</span>
      </span>
      <span className="flex items-center gap-1.5 font-mono text-ink3">
        <span className="mono-num font-bold text-ink2">{cs.events.length}</span> доступов
      </span>
      <span className="ml-auto flex items-center gap-1.5 text-[10px] font-mono uppercase tracking-wide" style={{color:'#FF6161'}}>
        <span className="inline-block w-5 h-[3px] rounded-full" style={{background:'linear-gradient(90deg,#FFC533,#FF6161)'}}></span>
        горящий attack-path
      </span>
    </div>
    </div>
  );
}

// Status-light system — несущий визуальный язык дашборда.
// Ключи crit/bad/warn/good — те же, что эмитит движок (priority.color, trigger.severity); не переименовывать.
const SEV = { crit:'#FF6161', bad:'#FF6161', warn:'#FFC533', high:'#FFC533', good:'#59D499' };
// человекочитаемый ярлык уровня для статус-полоски
const SEV_LABEL = { crit:'CRITICAL', bad:'HIGH', warn:'MEDIUM', high:'HIGH', good:'LOW' };

function ScoreRing({ score, color }) {
  const R = 46, C = 2*Math.PI*R, SZ = 124, CT = SZ/2;
  const off = C * (1 - score/100);
  const col = SEV[color] || '#38bdf8';
  return (
    <div className="relative" style={{width:SZ,height:SZ}}>
      <svg width={SZ} height={SZ} className="-rotate-90">
        <defs>
          <linearGradient id={`ring-${color}`} x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor={col} stopOpacity="0.55"/>
            <stop offset="100%" stopColor={col} stopOpacity="1"/>
          </linearGradient>
        </defs>
        {/* track */}
        <circle cx={CT} cy={CT} r={R} stroke="rgba(255,255,255,0.08)" strokeWidth="9" fill="none"/>
        <circle cx={CT} cy={CT} r={R} stroke={`url(#ring-${color})`} strokeWidth="9" fill="none"
          strokeDasharray={C} strokeDashoffset={off} strokeLinecap="round"
          style={{transition:'stroke-dashoffset .7s ease-out'}}/>
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <span className="text-[36px] font-extrabold leading-none tracking-tightest kpi-tick" style={{color:col}}>{score}</span>
        <span className="text-[9px] uppercase tracking-[0.18em] text-ink4 mt-1">/ 100 RISK</span>
      </div>
    </div>
  );
}

function Tag({ children, sev='warn' }) {
  const c = SEV[sev];
  return (
    <span className="inline-flex items-center gap-1 text-[10px] leading-none px-1.5 py-1 rounded-md font-mono font-semibold uppercase tracking-wide"
      style={{background:c+'1a', color:c, border:'1px solid '+c+'40'}}>
      <span className="w-1 h-1 rounded-full" style={{background:c, boxShadow:`0 0 5px ${c}`}}></span>
      {children}
    </span>
  );
}

function App() {
  const analyzed = useMemo(()=> CASES.map(c => ({ cs:c, res:analyze(c) })), []);
  // сортировка очереди по убыванию score (приоритизация)
  const queue = useMemo(()=> [...analyzed].sort((a,b)=> b.res.score - a.res.score), [analyzed]);
  const [selId, setSelId] = useState(queue[0].cs.id);
  const sel = analyzed.find(a => a.cs.id === selId);
  const [alertThreshold, setAlertThreshold] = useState(55); // what-if: порог тревоги (жюри двигает сам)

  const [apiKey, setApiKey] = useState('');
  const [sarText, setSarText] = useState('');
  const [sarLoading, setSarLoading] = useState(false);
  const [sarMode, setSarMode] = useState('');

  useEffect(()=> { setSarText(''); setSarMode(''); }, [selId]);

  // метрики корпуса для жюри: confusion-matrix на ground-truth + recall@top-N + снижение тревог.
  // Всё пересчитывается под порог тревоги alertThreshold (what-if — жюри двигает ползунок).
  const corpusMetrics = useMemo(()=> {
    const total = analyzed.length;
    const illicit = analyzed.filter(a => isIllicit(a.cs)).length;
    const benign = total - illicit;
    let TP=0, FP=0, FN=0, TN=0;
    analyzed.forEach(a => {
      const flagged = a.res.score >= alertThreshold;
      const bad = isIllicit(a.cs);
      if (flagged && bad) TP++; else if (flagged && !bad) FP++;
      else if (!flagged && bad) FN++; else TN++;
    });
    const precision = (TP+FP) ? TP/(TP+FP) : 1;
    const recall = (TP+FN) ? TP/(TP+FN) : 1;
    const f1 = (precision+recall) ? 2*precision*recall/(precision+recall) : 0;
    const accuracy = total ? (TP+TN)/total : 0;
    const alertsShown = TP+FP;
    const ranked = [...analyzed].sort((a,b)=> b.res.score - a.res.score);
    const hitsTopN = ranked.slice(0, illicit).filter(a => isIllicit(a.cs)).length;
    const recallTopN = illicit ? Math.round((hitsTopN/illicit)*100) : 100;

    // --- AUPRC (area under precision-recall curve) на ранжировании score корпуса ---
    // Считаем честно по 9 точкам: идём по порогу сверху вниз, на каждом TP накапливаем
    // precision×Δrecall (интерполяция прямоугольниками). Не accuracy — при дисбалансе ~0.1%
    // accuracy бесполезна (пустышка = 99.9%). Стандарт для редких инсайдер-событий: AUC-PR.
    let auprc = 0;
    if (illicit) {
      let tp = 0, fp = 0, prevRecall = 0;
      ranked.forEach(a => {
        if (isIllicit(a.cs)) tp++; else fp++;
        const rec = tp / illicit;
        const prec = (tp + fp) ? tp / (tp + fp) : 1;
        auprc += prec * (rec - prevRecall); // прямоугольник precision на шаге recall
        prevRecall = rec;
      });
    } else { auprc = 1; }

    // --- ЧЕСТНЫЙ наивный baseline на ТОМ ЖЕ корпусе (модель периметрового DLP/SIEM) ---
    // Грубое периметровое правило БЕЗ поведенческого baseline: флагает широко по сырому объёму
    // (любой доступ ≥ NAIVE_VOLUME строк) ИЛИ по частоте (≥ NAIVE_EVENTS событий в окне). У такого
    // правила нет понимания персональной нормы, поэтому оно: (1) ловит легит крупнообъёмный ETL/аудит
    // как ЛОЖНУЮ тревогу (FP — отсюда индустриальные ~95% ложных алертов, SOC «тонет в FP») и
    // (2) ПРОПУСКАЕТ тихих инсайдеров — боковое движение, эскалацию привилегий, компрометацию —
    // потому что их объём/частота сами по себе ниже грубых порогов. Сравниваем честно: то же
    // множество инцидентов, тот же ground-truth.
    const NAIVE_VOLUME = 30000; // сырой объёмный порог DLP (без учёта персональной нормы)
    const NAIVE_EVENTS = 5;     // сырой порог частоты/burst
    const naiveFlags = a =>
      a.cs.events.length >= NAIVE_EVENTS || a.cs.events.some(t => t.rows >= NAIVE_VOLUME);
    let naiveTP = 0, naiveFP = 0, naiveFN = 0;
    analyzed.forEach(a => {
      const flagged = naiveFlags(a), bad = isIllicit(a.cs);
      if (flagged && bad) naiveTP++;
      else if (flagged && !bad) naiveFP++;
      else if (!flagged && bad) naiveFN++;
    });
    const naiveAlerts = naiveTP + naiveFP;
    // Снижение ложных тревог: наш инструмент против наивного DLP (в нашу пользу, без двойного минуса).
    const reduction = naiveFP > 0 ? Math.max(0, Math.round((1 - FP / naiveFP) * 100)) : 0;
    return { total, illicit, benign, TP, FP, FN, TN, precision, recall, f1, accuracy, alertsShown,
      recallTopN, naiveAlerts, naiveTP, naiveFP, naiveFN, reduction, auprc };
  }, [analyzed, alertThreshold]);

  const genSAR = async () => {
    if (apiKey.trim()) {
      setSarLoading(true); setSarMode('claude');
      try {
        const t = await claudeSAR(sel.cs, sel.res, apiKey.trim());
        setSarText(t);
      } catch (e) {
        setSarText('Ошибка вызова Claude API: ' + e.message + '\n\n--- Показан mock-черновик ---\n\n' + mockSAR(sel.cs, sel.res));
        setSarMode('mock');
      } finally { setSarLoading(false); }
    } else {
      setSarMode('mock');
      setSarText(mockSAR(sel.cs, sel.res));
    }
  };

  // распределение очереди по статус-уровням — для световой полосы threat-level в шапке
  const sevCounts = useMemo(()=> {
    const c = { crit:0, bad:0, warn:0, good:0 };
    queue.forEach(({res}) => { c[res.priority.color] = (c[res.priority.color]||0) + 1; });
    return c;
  }, [queue]);

  return (
    <div className="min-h-full flex flex-col">
      {/* HEADER — командный центр SOC */}
      <header className="border-b border-edge bg-ink/90 backdrop-blur px-6 py-3.5 flex items-center justify-between gap-4 sticky top-0 z-20"
        style={{boxShadow:'0 1px 0 rgba(255,255,255,0.03), 0 10px 30px -20px rgba(0,0,0,0.9)'}}>
        <div className="flex items-center gap-3.5">
          <div className="relative w-11 h-11 rounded-xl flex items-center justify-center shrink-0"
            style={{background:'linear-gradient(140deg,#0e1320,#131a2b)', border:'1px solid #2c3a5c', boxShadow:'inset 0 0 18px rgba(56,189,248,0.12)'}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M12 2.5 4 5.5v6c0 5 3.4 8.4 8 10 4.6-1.6 8-5 8-10v-6L12 2.5Z"
                stroke="#38bdf8" strokeWidth="1.6" fill="#38bdf81a"/>
              <path d="M8.4 12.2l2.4 2.4 4.8-5" stroke="#34d399" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
          <div className="leading-tight">
            <div className="flex items-center gap-2">
              <h1 className="font-extrabold text-[15px] tracking-tightest text-ink1">AI&nbsp;SHIELD</h1>
              <span className="text-[10px] font-mono font-semibold uppercase tracking-[0.18em] text-accent px-1.5 py-0.5 rounded"
                style={{background:'#38bdf814', border:'1px solid #38bdf833'}}>Insider&nbsp;Guard</span>
            </div>
            <p className="text-[11px] text-muted mt-0.5">UEBA на access/audit-логах · граф пользователь→ресурс→хост · объяснимый риск-скор для SOC</p>
          </div>
        </div>
        <div className="flex items-center gap-5">
          {/* threat-level световая полоса */}
          <div className="hidden lg:flex items-center gap-2.5 px-3 py-1.5 rounded-lg" style={{background:'#0b0f1a', border:'1px solid #1f2a44'}}>
            <span className="text-[9px] uppercase tracking-[0.16em] text-muted">Threat&nbsp;level</span>
            {[['crit',sevCounts.crit],['bad',sevCounts.bad],['warn',sevCounts.warn],['good',sevCounts.good]].map(([k,n])=>(
              <span key={k} className="flex items-center gap-1 font-mono text-[11px] font-semibold" style={{color:SEV[k]}}>
                <span className="w-2 h-2 rounded-full" style={{background:SEV[k], boxShadow:`0 0 6px ${SEV[k]}`}}></span>{n}
              </span>
            ))}
          </div>
          <div className="flex flex-col items-end gap-0.5 text-[11px]">
            <span className="flex items-center gap-1.5 text-good font-medium">
              <span className="beacon w-2 h-2 rounded-full bg-good text-good"></span>Поток логов · LIVE (синтетика)
            </span>
            <span className="text-muted font-mono text-[10px]">AFM AI Hackathon 2026 · трек ai-shield</span>
          </div>
        </div>
      </header>

      {/* KPI-ПАНЕЛЬ (слайд жюри) */}
      <div className="bg-panel/70 border-b border-edge px-6 py-3">
        <div className="grid grid-cols-2 sm:grid-cols-4 xl:grid-cols-7 gap-2.5">
          <Metric label="Инцидентов в очереди" val={corpusMetrics.total} sub="в обработке SOC" />
          <Metric label="Реальных угроз" val={corpusMetrics.illicit} sub="типологий (ground-truth)" tone="crit" />
          <Metric label={`Recall @ top-${corpusMetrics.illicit}`} val={`${corpusMetrics.recallTopN}%`} sub="угроз в верхушке очереди" good />
          <Metric label="AUPRC" val={corpusMetrics.auprc.toFixed(3)} sub="площадь под PR-кривой" good />
          <Metric label="Ложных тревог · DLP→Shield" val={`${corpusMetrics.naiveFP} → ${corpusMetrics.FP}`} sub={corpusMetrics.reduction > 0 ? `снижение −${corpusMetrics.reduction}%` : 'контекст снимает FP'} good title="Грубый периметровый DLP/SIEM флагает легит крупнообъёмный ETL/аудит как ложную тревогу (нет персонального baseline). AI Shield контекстом снимает её." />
          <Metric label="Угроз поймано · DLP→Shield" val={`${corpusMetrics.naiveTP}/${corpusMetrics.illicit} → ${corpusMetrics.TP}/${corpusMetrics.illicit}`} sub="UEBA ловит тихих инсайдеров" good title="DLP/SIEM пропускает тихих инсайдеров (боковое движение / эскалация привилегий / компрометация) — их объём ниже грубых порогов. UEBA ловит по отклонению от персонального baseline." />
          <Metric label="Метрика качества" val="AUPRC + recall@top-N" sub="НЕ accuracy (дисбаланс ~0.1%)" warn title="Инсайдер-события редкие: классификатор-пустышка даёт ~99.9% accuracy и ловит ноль — поэтому меряем AUPRC и recall@top-N." />
        </div>
      </div>

      <ValidationBar threshold={alertThreshold} setThreshold={setAlertThreshold} m={corpusMetrics} />

      <div className="flex-1 grid grid-cols-12 gap-0 min-h-0">
        {/* ОЧЕРЕДЬ ИНЦИДЕНТОВ — триаж-лист SOC */}
        <aside className="col-span-3 border-r border-edge bg-panel/60 overflow-y-auto">
          <div className="px-4 py-3 border-b border-edge sticky top-0 bg-ink/90 backdrop-blur z-10 flex items-center justify-between">
            <span className="text-[10.5px] uppercase tracking-[0.14em] text-ink2 font-semibold">Очередь триажа</span>
            <span className="text-[10px] font-mono text-muted px-1.5 py-0.5 rounded" style={{background:'#0b0f1a', border:'1px solid #1f2a44'}}>{queue.length} active</span>
          </div>
          {queue.map(({cs,res}, qi) => {
            const suppressed = res.score < alertThreshold;
            const active = selId===cs.id;
            const c = SEV[res.priority.color];
            return (
            <button key={cs.id} onClick={()=>setSelId(cs.id)}
              className={`relative w-full text-left pl-5 pr-4 py-3 border-b border-edge/50 transition fade-in ${active?'bg-panel3':'hover:bg-panel2/60'} ${suppressed?'opacity-40':''}`}>
              {/* статус-световая полоса слева */}
              <span className="absolute left-0 top-0 bottom-0 w-[3px]" style={{background:c, boxShadow:active?`0 0 10px ${c}`:'none', opacity:active?1:0.55}}></span>
              <div className="flex items-center justify-between mb-1.5">
                <span className="flex items-center gap-1.5">
                  <span className="text-[9px] font-mono text-muted">#{String(qi+1).padStart(2,'0')}</span>
                  <span className="font-mono text-[11px] text-ink2 font-medium">{cs.id}</span>
                </span>
                <span className="font-mono font-extrabold text-[18px] leading-none kpi-tick" style={{color:c}}>{res.score}</span>
              </div>
              <div className="text-[12px] leading-snug mb-2 text-ink2 line-clamp-2">{cs.title}</div>
              <div className="flex items-center gap-1.5 flex-wrap">
                <Tag sev={res.priority.color}>{res.priority.lvl.split(' ')[0]}</Tag>
                {suppressed
                  ? <span className="text-[9.5px] text-muted font-mono uppercase tracking-wide">⤓ подавлено</span>
                  : <span className="text-[9.5px] text-muted font-mono uppercase tracking-wide truncate">{res.priority.lvl.split('—')[1] ? res.priority.lvl.split('—')[1].trim() : ''}</span>}
              </div>
            </button>
            );
          })}
          <div className="px-4 py-3.5 text-[10px] text-muted/80 leading-relaxed border-t border-edge/50">
            Очередь отсортирована по risk-score. SOC-аналитик работает сверху вниз — самое опасное первым.
          </div>
        </aside>

        {/* DETAIL */}
        <main className="col-span-9 overflow-y-auto p-6">
          {sel && <Detail key={sel.cs.id} cs={sel.cs} res={sel.res}
            apiKey={apiKey} setApiKey={setApiKey} onSelect={setSelId}
            sarText={sarText} sarLoading={sarLoading} sarMode={sarMode} genSAR={genSAR} setSarText={setSarText} />}
        </main>
      </div>
    </div>
  );
}

function ValidationBar({ threshold, setThreshold, m }) {

  return (
    <div className="bg-panel/70 border-b border-edge px-6 py-3.5">
      <div className="flex flex-wrap items-stretch gap-5">
        {/* WHAT-IF контролл */}
        <div className="flex-1 min-w-[300px]">
          <div className="flex items-center justify-between mb-2">
            <span className="text-[10px] uppercase tracking-[0.14em] text-ink2 font-semibold flex items-center gap-1.5">
              <span className="w-1.5 h-1.5 rounded-full bg-accent" style={{boxShadow:'0 0 6px #38bdf8'}}></span>
              What-if · порог тревоги
            </span>
            <span className="font-mono text-[13px] text-accent font-bold px-2 py-0.5 rounded" style={{background:'#38bdf814', border:'1px solid #38bdf833'}}>score ≥ {threshold}</span>
          </div>
          <input type="range" min="0" max="100" value={threshold} onChange={e => setThreshold(+e.target.value)} className="soc w-full" />
          <div className="flex justify-between text-[9px] text-muted mt-1 font-mono">
            <span>0 · всё в тревоги (FP↑)</span><span>55 · баланс</span><span>100 · молчим (FN↑)</span>
          </div>
          <p className="text-[10.5px] text-ink3 mt-2 leading-snug">
            SOC-аналитику показано <span className="text-ink1 font-mono font-semibold">{m.alertsShown}</span> из {m.total} инцидентов (ниже порога — подавлено, экономим время).
            Ground-truth: <span className="text-ink1 font-mono">{m.illicit}</span> реальных угроз / <span className="text-ink1 font-mono">{m.benign}</span> легит (ETL-сервис, плановый аудит).
          </p>
          <p className="text-[10px] text-warn/90 mt-1.5 leading-snug flex gap-1.5">
            <span className="shrink-0">⚠</span>
            <span>Инсайдер-события редкие: классификатор-пустышка даёт ~99.9% accuracy и ловит ноль — меряем AUPRC и recall@top-N, а не accuracy. Реальные инсайдеры маскируются под норму → держим консервативный baseline.</span>
          </p>
        </div>
        {/* CONFUSION MATRIX */}
        <div className="flex flex-col gap-1.5">
          <span className="text-[9px] uppercase tracking-[0.14em] text-muted">Confusion matrix</span>
          <div className="flex items-center gap-2">
            <ConfCell label="поймано TP" val={m.TP} color="#34d399" />
            <ConfCell label="лож. трев. FP" val={m.FP} color="#f43f5e" />
            <ConfCell label="пропуски FN" val={m.FN} color="#fbbf24" />
            <ConfCell label="верно сняты TN" val={m.TN} color="#38bdf8" />
          </div>
        </div>
        {/* SCORES */}
        <div className="flex flex-col gap-1.5 pl-5 border-l border-edge">
          <span className="text-[9px] uppercase tracking-[0.14em] text-muted">Качество детекта</span>
          <div className="flex items-center gap-4 pt-0.5">
            <ValMetric label="Precision" value={pct(m.precision)} color={m.precision >= 0.99 ? '#34d399' : '#fbbf24'} />
            <ValMetric label="Recall" value={pct(m.recall)} color={m.recall >= 0.99 ? '#34d399' : '#fbbf24'} />
            <ValMetric label="F1" value={pct(m.f1)} color={f1col} />
            <ValMetric label="accuracy ⚠" value={pct(m.accuracy)} color="#5b6b8c" dim />
          </div>
        </div>
      </div>
    </div>
  );
}

function Metric({ label, val, good, warn, tone, sub, title }) {
  const col = tone ? SEV[tone] : good ? '#34d399' : warn ? '#fbbf24' : '#eaf0fb';
  const accentBar = good ? '#34d399' : warn ? '#fbbf24' : tone ? SEV[tone] : '#38bdf8';
  return (
    <div className="relative panel-card rounded-lg border border-edge px-3 py-2 overflow-hidden group hover:border-edge2 transition"
      title={title} style={title ? {cursor:'help'} : undefined}>
      <span className="absolute left-0 top-2 bottom-2 w-[3px] rounded-full" style={{background:accentBar, boxShadow:`0 0 8px ${accentBar}66`}}></span>
      <div className="pl-2">
        <div className="text-[9.5px] uppercase tracking-[0.1em] text-muted leading-tight flex items-center gap-1">
          {label}{title ? <span className="text-edge2">ⓘ</span> : null}
        </div>
        <div className="font-mono font-bold text-[17px] leading-tight mt-0.5 kpi-tick truncate" style={{color:col}}>{val}</div>
        {sub && <div className="text-[9.5px] text-muted/80 leading-tight mt-0.5 truncate">{sub}</div>}
      </div>
    </div>
  );
}

function Detail({ cs, res, apiKey, setApiKey, sarText, sarLoading, sarMode, genSAR, onSelect }) {
  const related = relatedCases(cs);
  const pc = SEV[res.priority.color];
  return (
    <div className="fade-in space-y-5">
      {/* HEAD — карточка инцидента со статус-акцентом */}
      <div className="relative flex items-start justify-between gap-5 panel-card rounded-2xl border border-edge p-5 overflow-hidden"
        style={{boxShadow:'0 1px 0 rgba(255,255,255,0.03) inset, 0 12px 32px -18px rgba(0,0,0,0.8)'}}>
        <span className="absolute left-0 top-0 bottom-0 w-1" style={{background:pc, boxShadow:`0 0 16px ${pc}`}}></span>
        <span className="absolute -top-24 -left-16 w-72 h-72 rounded-full pointer-events-none" style={{background:`radial-gradient(circle, ${pc}14, transparent 70%)`}}></span>
        <div className="flex-1 relative">
          <div className="flex items-center gap-2.5 mb-2">
            <span className="font-mono text-[12px] text-ink2 font-semibold px-2 py-0.5 rounded" style={{background:'#0b0f1a', border:'1px solid #1f2a44'}}>{cs.id}</span>
            <Tag sev={res.priority.color}>{res.priority.lvl}</Tag>
            <span className="text-[10px] font-mono uppercase tracking-[0.16em]" style={{color:pc}}>{SEV_LABEL[res.priority.color]}</span>
          </div>
          <h2 className="text-[21px] font-extrabold tracking-tightest text-ink1 leading-tight mb-2">{cs.title}</h2>
          <p className="text-[11.5px] text-muted mb-3 font-mono">
            <span className="uppercase tracking-wide">Источник сигнала</span> · <span className="text-ink2">{cs.channel}</span>
          </p>
          <p className="text-[13px] text-ink2 leading-relaxed">{cs.facts}</p>
          {cs.source && (
            <p className="text-[10.5px] text-muted mt-3 leading-snug border-l-2 border-edge2 pl-2.5">
              <span className="text-ink3 font-semibold uppercase tracking-wide text-[9.5px]">Источник методики ·</span> {cs.source}
            </p>
          )}
          {related.length > 0 && (
            <div className="mt-3 flex items-center gap-2 flex-wrap text-[11px]">
              <span className="text-muted uppercase tracking-[0.12em] text-[9.5px] font-semibold">Связанные инциденты</span>
              {related.map(rc => (
                <button key={rc.id} onClick={()=> onSelect && onSelect(rc.id)}
                  title={rc.title}
                  className="font-mono rounded-md px-2 py-1 transition hover:brightness-125 flex items-center gap-1"
                  style={{ background:'#818cf81f', color:'#a5b4fc', border:'1px solid #818cf844' }}>
                  ⇄ {rc.id} · общий скомпрометированный маркер
                </button>
              ))}
            </div>
          )}
          <p className="text-[11.5px] mt-3 font-medium flex items-center gap-1.5" style={{color:pc}}>
            <span>▸</span>{res.priority.note}
          </p>
        </div>
        <div className="flex flex-col items-center gap-2 shrink-0 relative">
          <ScoreRing score={res.score} color={res.priority.color} />
        </div>
      </div>

      <div className="grid grid-cols-12 gap-5">
        {/* ГРАФ — ГЕРОЙ: центральный attack-path */}
        <div className="col-span-7 panel-card rounded-lg border border-edge p-6">
          <div className="flex items-center justify-between mb-1">
            <h3 className="text-[13px] font-semibold text-ink1 tracking-tightest">Attack-path · как собралась цепочка</h3>
            {res.graphStats.cycle
              ? <span className="text-[9.5px] font-mono uppercase tracking-wide px-2 py-0.5 rounded-md" style={{color:'#FF6161', background:'rgba(255,97,97,0.15)', border:'1px solid rgba(255,97,97,0.3)'}}>● боковое перемещение</span>
              : <span className="text-[9.5px] font-mono uppercase tracking-wide px-2 py-0.5 rounded-md" style={{color:'#FFC533', background:'rgba(255,197,51,0.15)', border:'1px solid rgba(255,197,51,0.3)'}}>● путь к данным</span>}
          </div>
          <p className="text-[11px] text-ink3 mb-4 leading-snug">Горящий путь = вход → пользователь → доступ → хост → ресурс. Остальной контекст приглушён. Рёбра подписаны действием и объёмом.</p>
          <GraphView cs={cs} res={res} />
          <div className="mt-4 grid grid-cols-3 gap-2.5">
            <Stat k="Узлов в графе" v={res.graphStats.nodes} />
            <Stat k="Событий (рёбер)" v={res.graphStats.edges} />
            <Stat k="Объём, строк" v={fmt(res.graphStats.totalRows)} />
          </div>
        </div>

        {/* SHAP / ОБЪЯСНИМОСТЬ */}
        <div className="col-span-5 panel-card rounded-2xl border border-edge p-5">
          <h3 className="text-[11px] uppercase tracking-[0.14em] text-ink2 font-semibold mb-1.5">Почему помечено · вклад факторов</h3>
          <p className="text-[10px] text-muted mb-4 leading-snug">SHAP-подобная аддитивная декомпозиция (Σ вкладов = score). Объяснимость каждого алерта = регуляторное требование (EU AI Act; трассируемые логи для SOC и расследования инцидентов с ПДн).</p>
          <div className="space-y-3.5">
            {res.shap.length === 0 && (
              <div className="flex items-center gap-2 text-[12px] text-good rounded-lg p-3 border" style={{borderColor:'#34d39940', background:'#34d39910'}}>
                <span className="w-2 h-2 rounded-full bg-good" style={{boxShadow:'0 0 6px #34d399'}}></span>
                Аномалий не выявлено — ложная тревога не сформирована.
              </div>
            )}
            {res.shap.map((s,i)=> {
              const sc = SEV[s.severity];
              return (
              <div key={i} className="fade-in">
                <div className="flex items-center justify-between gap-2 mb-1.5">
                  <span className="flex items-center gap-2 min-w-0">
                    <Tag sev={s.severity}>{s.code}</Tag>
                    <span className="text-[12px] text-ink1 truncate">{s.label}</span>
                  </span>
                  <span className="font-mono font-extrabold text-[17px] leading-none kpi-tick shrink-0" style={{color:sc}}>+{s.contribution}</span>
                </div>
                <div className="w-full h-2 rounded-full bg-edge/70 overflow-hidden">
                  <div className="h-full rounded-full" style={{width:`${Math.min(100,s.contribution/Math.max(1,res.score)*100)}%`, background:`linear-gradient(90deg, ${sc}99, ${sc})`, boxShadow:`0 0 8px ${sc}66`, transition:'width .6s cubic-bezier(.2,.7,.3,1)'}}></div>
                </div>
                <p className="text-[10.5px] text-ink3 mt-1.5 leading-snug">{s.detail}</p>
              </div>
              );
            })}
            {res.mitigation && (
              <div className="mt-1 flex items-start gap-2.5 text-[11px] rounded-xl p-3 border" style={{ borderColor: '#34d39940', background: 'linear-gradient(180deg,#34d39912,#34d39905)' }}>
                <span className="text-good font-mono whitespace-nowrap font-bold uppercase tracking-wide text-[10px] mt-0.5">− контекст ×{res.mitigation.factor}</span>
                <span className="text-ink2 leading-snug">{res.mitigation.note}</span>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* РЕКОМЕНДАЦИИ (IR-плейбук) */}
      <div className="panel-card rounded-2xl border border-edge p-5">
        <h3 className="text-[11px] uppercase tracking-[0.14em] text-ink2 font-semibold mb-3.5">Плейбук реагирования · Incident Response</h3>
        <ol className="space-y-2.5">
          {(RESPONSE[cs.typology]||[]).map((r,i)=> (
            <li key={i} className="text-[13px] text-ink2 flex gap-3 items-start">
              <span className="shrink-0 w-6 h-6 rounded-md flex items-center justify-center font-mono font-bold text-[11px] text-accent mt-px"
                style={{background:'#38bdf814', border:'1px solid #38bdf833'}}>{i+1}</span>
              <span className="leading-snug pt-0.5">{r}</span>
            </li>
          ))}
        </ol>
      </div>

      {/* IR-ОТЧЁТ ГЕНЕРАЦИЯ */}
      <div className="panel-card rounded-2xl border border-edge p-5">
        <div className="flex items-center justify-between mb-3 flex-wrap gap-3">
          <h3 className="text-[11px] uppercase tracking-[0.14em] text-ink2 font-semibold">Черновик инцидент-отчёта · Incident Response</h3>
          <div className="flex items-center gap-2">
            <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)}
              placeholder="Anthropic API-ключ (опц.) — иначе mock"
              className="text-[11px] bg-ink border border-edge rounded-lg px-2.5 py-1.5 w-64 font-mono text-ink1 placeholder:text-muted focus:border-accent focus:ring-1 focus:ring-accent/40 outline-none transition" />
            <button onClick={genSAR} disabled={sarLoading}
              className="text-[12px] font-bold text-ink rounded-lg px-3.5 py-1.5 transition disabled:opacity-50 hover:brightness-110"
              style={{background:'linear-gradient(180deg,#38bdf8,#0ea5e9)', boxShadow:'0 0 16px -4px rgba(56,189,248,0.5)'}}>
              {sarLoading ? 'Генерация…' : '▸ Сформировать черновик'}
            </button>
          </div>
        </div>
        {sarMode && <p className="text-[10px] mb-2.5 font-mono flex items-center gap-1.5" style={{color: sarMode==='claude'?'#34d399':'#fbbf24'}}>
          <span className="w-1.5 h-1.5 rounded-full" style={{background: sarMode==='claude'?'#34d399':'#fbbf24', boxShadow:`0 0 6px ${sarMode==='claude'?'#34d399':'#fbbf24'}`}}></span>
          {sarMode==='claude' ? 'Сгенерировано через Claude (claude-sonnet-4-6)' : 'Mock-режим (детерминированный шаблон, без сети)'}
        </p>}
        {sarText
          ? <pre className="scanline text-[11.5px] text-ink2 whitespace-pre-wrap leading-relaxed bg-ink rounded-xl p-4 border border-edge font-mono fade-in">{sarText}</pre>
          : <p className="text-[12px] text-muted leading-snug">Нажмите «Сформировать черновик» — движок соберёт инцидент-отчёт из триггеров (mock) или вызовет Claude, если введён ключ.</p>}
      </div>

      <p className="text-[10px] text-muted/80 text-center pb-3 leading-snug">⚠ Все данные синтетические (ИИН / ФИО / IP вымышлены). Прототип защиты данных для AFM AI Hackathon 2026. Не является процессуальным решением.</p>
    </div>
  );
}

function Legend({ c, t }) {
  return (
    <span className="flex items-center gap-1.5 text-[10px] text-ink3">
      <span className="w-2.5 h-2.5 rounded-full" style={{background:c, boxShadow:`0 0 6px ${c}88`}}></span>{t}
    </span>
  );
}
function Stat({ k, v }) {
  return (
    <div className="bg-ink rounded-lg p-2.5 border border-edge">
      <div className="text-[9px] uppercase tracking-[0.1em] text-muted">{k}</div>
      <div className="font-mono font-bold text-[15px] text-ink1 kpi-tick mt-0.5">{v}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
