# Fly.io fallback. Mounts a volume for SQLite persistence.
app = "ai-shield"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  DB_PATH = "/data/insider.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      path = "/api/health"
      interval = "15s"
      timeout = "2s"
      grace_period = "10s"

[[mounts]]
  source = "ai_shield_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
